<!DOCTYPE html>
<html lang="it">
<head>
    <link rel=¨manifest¨ href=¨manifest.json¨>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Manager Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --orange: #f97316; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 2rem; margin: 0; }
        h1 { color: var(--orange); margin-bottom: 2rem; font-weight: 800; border-bottom: 2px solid #334155; padding-bottom: 1rem; }
        h2 { margin-top: 2rem; color: #94a3b8; font-size: 1.2rem; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; }
        .card h3 { margin: 0 0 1rem 0; color: var(--text); }
        .card p { margin: 0.5rem 0; color: #cbd5e1; font-size: 0.9rem; }
        .highlight { color: var(--orange); font-weight: 700; }
        
        .btn-view { background: #3b82f6; border: none; color: white; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; margin-top: 1rem; width: 100%; font-weight: 600; }
        .details-box { display: none; background: #0f172a; padding: 1rem; border-radius: 8px; margin-top: 1rem; border: 1px dashed #334155; }
        .details-box img { max-width: 100%; border-radius: 6px; margin-top: 0.5rem; }
        
        /* Stile per il menu a tendina dello storico */
        details { background: var(--card); padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid #334155; margin-top: 3rem; }
        summary { font-size: 1.2rem; font-weight: 800; color: #94a3b8; cursor: pointer; text-transform: uppercase; list-style: none; display: flex; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        summary::before { content: "▶"; margin-right: 10px; color: var(--orange); transition: transform 0.2s; }
        details[open] summary::before { transform: rotate(90deg); }
    </style>
</head>
<body>

    <h1>RAR LOGISTIK HUB</h1>

    <h2>Rotte Attive</h2>
    <div class="grid" id="rotteAttive">Caricamento...</div>

    <!-- MENU A TENDINA PER LO STORICO ROTTE -->
    <details>
        <summary>Storico Rotte Completate</summary>
        <div class="grid" id="storicoRotte" style="margin-top: 1.5rem;">Nessuna rotta completata.</div>
    </details>

    <h2>Spedizioni Effettuate (Dettaglio)</h2>
    <div class="grid" id="storicoSpedizioni">Caricamento...</div>

    <h2>Ritiri Scannerizzati (Pick-up)</h2>
    <div class="grid" id="storicoRitiri">Caricamento...</div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {  
            apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0",  
            authDomain: "rar-logistik-7663d.firebaseapp.com",   
            projectId: "rar-logistik-7663d",    
            storageBucket: "rar-logistik-7663d.firebasestorage.app",    
            messagingSenderId: "657384053565",  
            appId: "1:657384053565:web:fc1e812a80553f1eb08354"  
        };    
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. ROTTE ATTIVE E STORICO ROTTE
        db.collection("Rotte").onSnapshot(snap => {
            let htmlAttive = "";
            let htmlStorico = "";
            
            snap.forEach(doc => {
                let data = doc.data();
                let tappe = data.tappe || [];
                let tappeRimaste = tappe.filter(t => !t.consegnato);
                let autistaAssegnato = data.autista || 'In attesa di autista...';
                
                if(tappeRimaste.length > 0) {
                    let ultIndirizzo = tappeRimaste[0].address;
                    let numRimaste = tappeRimaste.length;
                    
                    let dataStima = new Date();
                    dataStima.setMinutes(dataStima.getMinutes() + (numRimaste * 12));
                    
                    htmlAttive += `<div class="card">
                        <h3>Rotta <span class="highlight">#${doc.id}</span></h3>
                        <p>Autista: <b style="color:white;">${autistaAssegnato}</b></p>
                        <p>Prossimo Stop: <b>${ultIndirizzo}</b></p>
                        <p>Stop mancanti: <b>${numRimaste}</b></p>
                        <p>ETA Fine Turno: <span class="highlight">${dataStima.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'})}</span></p>
                    </div>`;
                } else {
                    htmlStorico += `<div class="card" style="opacity: 0.8;">
                        <h3>Rotta <span class="highlight">#${doc.id}</span></h3>
                        <p>Autista: <b style="color:white;">${autistaAssegnato}</b></p>
                        <p style="color: #4ade80; font-weight: bold;">✔ Completata</p>
                    </div>`;
                }
            });
            document.getElementById('rotteAttive').innerHTML = htmlAttive || "<p>Nessuna rotta attiva.</p>";
            document.getElementById('storicoRotte').innerHTML = htmlStorico || "<p>Nessuna rotta completata.</p>";
        });

        // 2. SPEDIZIONI EFFETTUATE
        db.collection("SpedizioniEffettuate").orderBy("dataConsegna", "desc").limit(30).onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                let d = doc.data();
                let dateObj = new Date(d.dataConsegna);
                let coords = d.coordinateArrivo ? `${d.coordinateArrivo.lat.toFixed(5)}, ${d.coordinateArrivo.lng.toFixed(5)}` : "Sconosciute";
                
                let detailMedia = d.dettagliEsito.firma ? `<img src="${d.dettagliEsito.firma}">` : 
                                 (d.dettagliEsito.fotoProva ? `<img src="${d.dettagliEsito.fotoProva}">` : "Nessun media allegato");

                html += `<div class="card">
                    <p style="font-size:0.8rem; color:#94a3b8;">${dateObj.toLocaleString('it-IT')} | Rotta #${d.idRotta}</p>
                    <h3 style="font-size:1rem;">${d.indirizzo}</h3>
                    <button class="btn-view" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">Vedi Dettagli</button>
                    <div class="details-box">
                        <p><b>Coordinate:</b> <a href="https://maps.google.com/?q=${coords}" target="_blank" style="color:#4ade80;">${coords}</a></p>
                        <p><b>Colli:</b> ${d.colli}</p>
                        <p><b>Esito:</b> ${d.dettagliEsito.esito} ${d.dettagliEsito.persona ? '('+d.dettagliEsito.persona+')' : ''}</p>
                        ${detailMedia}
                    </div>
                </div>`;
            });
            document.getElementById('storicoSpedizioni').innerHTML = html || "<p>Nessuna spedizione registrata.</p>";
        });

        // 3. RITIRI SCANNERIZZATI
        db.collection("Ritiri").orderBy("orario", "desc").limit(20).onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                let d = doc.data();
                let time = d.orario ? new Date(d.orario.toDate()).toLocaleString('it-IT') : '--';
                html += `<div class="card">
                    <p style="font-size:0.8rem; color:#94a3b8;">Scansione: ${time}</p>
                    <h3>Codice: <span class="highlight">${d.etichetta}</span></h3>
                </div>`;
            });
            document.getElementById('storicoRitiri').innerHTML = html || "<p>Nessun ritiro scannerizzato.</p>";
        });
    </script>
</body>
</html>
