<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Pick-up Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e293b; padding: 1rem; text-align: center; font-weight: 800; border-bottom: 1px solid #334155; }
        header span { color: #f97316; }
        .scanner-container { flex: 1; position: relative; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 150px; border: 2px dashed #f97316; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none; }
        
        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 1rem 2rem; border-radius: 30px; font-weight: 700; transition: bottom 0.3s; z-index: 10; }
        .toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <header>Scanner <span>PICK-UP</span></header>

    <div class="scanner-container">
        <video id="videoElement"></video>
        <div class="overlay-guide"></div>
    </div>

    <div id="toastMessage" class="toast">Scansione completata!</div>

    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {  
            apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0",  
            authDomain: "rar-logistik-7663d.firebaseapp.com",   
            projectId: "rar-logistik-7663d",    
            storageBucket: "rar-logistik-7663d.firebasestorage.app",    
            messagingSenderId: "657384053565",  
            appId: "1:657384053565:web:fc1e812a80553f1eb08354"  
        };    
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const codeReader = new ZXing.BrowserMultiFormatReader();
        let lastScan = "";

        codeReader.decodeFromVideoDevice(null, 'videoElement', (result, err) => {
            if (result && result.text !== lastScan) {
                lastScan = result.text;
                
                db.collection("Ritiri").add({
                    etichetta: result.text,
                    orario: firebase.firestore.FieldValue.serverTimestamp()
                });

                const t = document.getElementById('toastMessage');
                t.innerText = "Salvato: " + result.text;
                t.classList.add('show');
                
                // Beep sonoro
                let ctx = new AudioContext();
                let o = ctx.createOscillator();
                o.type = "sine"; o.connect(ctx.destination);
                o.start(); setTimeout(() => o.stop(), 200);

                setTimeout(() => { t.classList.remove('show'); lastScan = ""; }, 3000);
            }
        });
    </script>
</body>
</html>
