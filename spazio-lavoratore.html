<!DOCTYPE html>
<html lang="it">
<head>
    <link rel=¨manifest¨ href=¨manifest.json¨>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Worker area</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .driver-dashboard { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #0f172a; }
        
        /* Contenuto Principale Home Page */
        .main-content { padding: 3rem 1.5rem; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        .status-card { background: #1e293b; width: 100%; border-radius: 24px; padding: 2.5rem 1.5rem; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4); box-sizing: border-box; }
        .driver-welcome { font-size: 2rem; font-weight: 800; color: #ffffff; margin-bottom: 0.75rem; }
        .status-badge { display: inline-block; padding: 0.5rem 1.2rem; background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 9999px; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Navbar Superiore */
        .navbar { background: #1e293b; padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; position: relative; z-index: 30; }
        .logo { font-weight: 800; font-size: 1.1rem; color: white; text-decoration: none; }
        .logo span { color: #f97316; }
        .hamburger-btn { background: none; border: none; font-size: 2rem; color: #f8fafc; cursor: pointer; padding: 0.5rem; display: flex; align-items: center; }
        .hamburger-btn:hover { color: #f97316; }

        /* MENU SLIDE-OUT LATERALE ESSENZIALE */
        .side-menu { position: fixed; top: 0; left: -100%; width: 290px; height: 100%; background: #1e293b; z-index: 999; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid #334155; box-shadow: 15px 0 30px rgba(0,0,0,0.5); padding: 1.5rem; box-sizing: border-box; display: flex; flex-direction: column; }
        .side-menu.open { left: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 990; display: none; }
        .menu-overlay.show { display: block; }
        
        .close-menu-btn { align-self: flex-end; background: none; border: none; color: #94a3b8; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 2rem; font-family: inherit; }
        
        .menu-links { display: flex; flex-direction: column; gap: 0.75rem; }
        .menu-link-item { color: #f1f5f9; text-decoration: none; font-size: 1rem; font-weight: 700; padding: 1rem; background: #293548; border: 1px solid #334155; border-radius: 12px; transition: all 0.2s ease; display: flex; align-items: center; gap: 0.75rem; width: 100%; text-align: left; cursor: pointer; font-family: inherit; box-sizing: border-box; }
        .menu-link-item:hover { background: #f97316; color: white; border-color: #f97316; }
        
        /* Bottone Logout Separato Visivamente */
        .menu-link-item.logout-trigger { margin-top: 2rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; }
        .menu-link-item.logout-trigger:hover { background: #ef4444; color: white; border-color: #ef4444; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- OVERLAY DI SFONDO QUANDO IL MENU È APERTO -->
    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu(false)"></div>
    
    <!-- MENU HAMBURGER ULTRAPULITO -->
    <nav id="sideMenu" class="side-menu">
        <button class="close-menu-btn" onclick="toggleMenu(false)">✕ Close</button>
        <div class="menu-links">
            <!-- Rimasti solo i due bottoni richiesti -->
            <button onclick="navigaA('navigatore.html')" class="menu-link-item">🗺️ Start Route</button>
            <button onclick="eseguiLogout()" class="menu-link-item logout-trigger">🚪 End Route</button>
        </div>
    </nav>

    <!-- INTERFACCIA HOME PAGE (STILE INALTERATO) -->
    <div class="driver-dashboard">
        <header class="navbar">
            <button class="hamburger-btn" onclick="toggleMenu(true)">☰</button>
            <a href="#" class="logo">RAR <span>Logistik</span></a>
            <div style="width: 38px;"></div> <!-- Bilanciatore estetico del menu -->
        </header>

        <div class="main-content">
            <div class="status-card">
                <div class="driver-welcome" id="txtBenvenuto">Welcome Driver</div>
                <span class="status-badge">Online ●</span>
            </div>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('rar_active_user') || "Driver";

        document.addEventListener('DOMContentLoaded', () => {
            // Controllo sessione per sicurezza
            if(!localStorage.getItem('rar_active_user') || currentUser === "Rar Logistik") {
                window.location.href = "login.html";
                return;
            }
            document.getElementById('txtBenvenuto').innerText = `Benvenuto, ${currentUser}`;
        });

        function toggleMenu(open) {
            if(open) {
                document.getElementById('sideMenu').classList.add('open');
                document.getElementById('menuOverlay').classList.add('show');
            } else {
                document.getElementById('sideMenu').classList.remove('open');
                document.getElementById('menuOverlay').classList.remove('show');
            }
        }

        function navigaA(pagina) {
            toggleMenu(false);
            window.location.href = pagina;
        }

        function eseguiLogout() {
            localStorage.removeItem('rar_active_user');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
