<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Scanner QR Google Cloud</title>
    <!-- Libreria per la scansione ultra-rapida dei codici QR tramite fotocamera -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .split-scanner-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: #0f172a; color: white; }
        
        /* Area Superiore Operativa */
        .workspace-area { padding: 1rem; overflow-y: auto; max-height: 55vh; background: #1e293b; border-bottom: 2px solid #334155; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Box Fotocamera Scanner */
        .camera-card { background: #0f172a; border-radius: 16px; padding: 0.75rem; overflow: hidden; margin-bottom: 1rem; position: relative; border: 1px solid #334155; }
        .camera-viewport { position: relative; width: 100%; height: 180px; background: #000; border-radius: 12px; overflow: hidden; }
        
        /* Overlay Mirino Laser del QR */
        .laser-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 130px; height: 130px; border: 3px solid #f97316; border-radius: 12px; box-shadow: 0 0 0 999px rgba(0,0,0,0.6); pointer-events: none; z-index: 5; }
        .laser-line { position: absolute; width: 100%; height: 2px; background-color: #ef4444; box-shadow: 0 0 8px #ef4444; top: 0; animation: scanRadar 2s infinite ease-in-out; }
        @keyframes scanRadar { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* Status Banner */
        .status-banner { text-align: center; font-size: 0.8rem; font-weight: 700; color: #94a3b8; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Lista dei Pacchi Inseriti */
        .stop-item-card { background: #0f172a; border: 1px solid #334155; padding: 0.85rem; border-radius: 12px; margin-bottom: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem; }
        .stop-address-text { font-size: 0.9rem; font-weight: 700; color: #ffffff; }
        .stop-dest-name { font-size: 0.8rem; font-weight: 600; color: #f97316; text-transform: uppercase; }

        /* Mappa Inferiore (Google) */
        #google-map { width: 100%; flex: 1; min-height: 250px; z-index: 1; }
    </style>
</head>
<body>

    <div class="split-scanner-container">
        
        <header class="navbar" style="background:#1e293b; border-bottom: 1px solid #334155; position: relative; z-index: 20;">
            <a href="spazio-lavoratore.html" class="logo">RAR <span>Logistik</span></a>
            <button onclick="fineScannerizzazione()" class="btn-login" style="background:#f97316; color:white; border:none; border-radius:8px; font-weight:bold; font-size:0.8rem; padding:0.4rem 0.8rem; cursor:pointer;">Ottimizza 🏁</button>
        </header>

        <!-- AREA SUPERIORE OPERATIVA -->
        <div class="workspace-area">
            
            <!-- Fotocamera Scannerizzata dal vivo -->
            <div class="camera-card">
                <div class="camera-viewport">
                    <div id="qr-reader" style="width: 100%; height: 100%;"></div>
                    <div class="laser-box">
                        <div class="laser-line"></div>
                    </div>
                </div>
            </div>

            <div class="status-banner" id="status">Inquadra il QR Code sull'etichetta</div>

            <!-- Elenco in tempo reale dei pacchi caricati -->
            <div style="margin-bottom: 1rem;">
                <div style="display:flex; justify-content:space-between; font-size:0.9rem; font-weight:700; margin-bottom:0.5rem;">
                    <span>📦 Pacchi nel Furgone</span>
                    <span id="itemsCounter" style="color:#f97316;">0 Caricati</span>
                </div>
                <div id="stopList"></div>
            </div>

        </div>

        <!-- AREA INFERIORE: Nuova Mappa Google -->
        <div id="google-map"></div>

    </div>

    <!-- Script di connessione a Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {  
            apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0",  
            authDomain: "rar-logistik-7663d.firebaseapp.com",   
            projectId: "rar-logistik-7663d",    
            storageBucket: "rar-logistik-7663d.firebasestorage.app",    
            messagingSenderId: "657384053565",  
            appId: "1:657384053565:web:fc1e812a80553f1eb08354"  
        };    

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>

    <!-- Script logico di Google Maps e del QR Reader -->
    <script>
        let map;
        let geocoder;
        let stops = [];
        let html5QrCode;
        let isProcessing = false;
        let markers = [];

        const status = document.getElementById('status');
        let currentUser = localStorage.getItem('rar_active_user') || "Ospite";
        const DEPOSITO_START = { lat: 46.6249, lng: 14.3053 }; // Centro Carinzia / Austria base

        // Callback chiamata quando le API di Google Maps sono pronte
        function initGoogleScanner() {
            geocoder = new google.maps.Geocoder();
            
            // Inizializza mappa scura coerente con il design
            map = new google.maps.Map(document.getElementById("google-map"), {
                zoom: 12,
                center: { lat: DEPOSITO_START.lat, lng: DEPOSITO_START.lon },
                disableDefaultUI: true,
                zoomControl: true
            });

            // Inseriamo il marker del magazzino RAR Logistik
            new google.maps.Marker({
                position: { lat: DEPOSITO_START.lat, lng: DEPOSITO_START.lon },
                map: map,
                title: "Magazzino RAR Logistik",
                icon: {
                    path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,
                    scale: 5,
                    fillColor: "#000000",
                    fillOpacity: 1,
                    strokeColor: "#ffffff",
                    strokeWeight: 2
                }
            });

            // Avvio della fotocamera per i QR
            inizializzaLettoreQR();
        }

        function inizializzaLettoreQR() {
            html5QrCode = new Html5Qrcode("qr-reader");
            const config = { fps: 15, qrbox: { width: 130, height: 130 } };
            
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess
            ).catch(err => {
                console.error(err);
                status.innerText = "Errore fotocamera. Richiede HTTPS attivo.";
            });
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true;

            if (navigator.vibrate) navigator.vibrate(100);
            status.innerText = "Verifica Cloud Firebase... ☁️";

            try {
                const docRef = doc(window.db, "Spedizioni", decodedText.trim());
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    const giaPresente = stops.some(s => s.id === decodedText.trim());
                    if (giaPresente) {
                        status.innerText = "⚠️ Pacco già caricato sul mezzo!";
                        rimettiInAscolto();
                        return;
                    }

                    status.innerText = "Geocodifica stradale Google... 🗺️";
                    
                    // Conversione dell'indirizzo in coordinate tramite le mappe di Google
                    geocoder.geocode({ address: data.indirizzo }, (results, statusGeo) => {
                        if (statusGeo === "OK" && results[0]) {
                            const location = results[0].geometry.location;
                            
                            const nuovoStop = {
                                id: decodedText.trim(),
                                destinatario: data.destinatario,
                                address: data.indirizzo,
                                notes: data.note || "Nessuna nota",
                                time: "Nessuna",
                                lat: location.lat(),
                                lon: location.lng(),
                                consegnato: false
                            };

                            stops.push(nuovoStop);
                            document.getElementById('itemsCounter').innerText = `${stops.length} Caricati`;

                            // Creazione del marker rosso di Google Maps per il pacco
                            const marker = new google.maps.Marker({
                                position: location,
                                map: map,
                                title: `Stop #${stops.length}`,
                                animation: google.maps.Animation.DROP
                            });
                            markers.push(marker);

                            // Centra la visuale sul nuovo pacco inserito
                            map.setCenter(location);
                            map.setZoom(14);

                            renderStopsList();
                            status.innerText = "✅ Pacco aggiunto con successo!";
                        } else {
                            status.innerText = "❌ Google non trova questo indirizzo.";
                        }
                    });

                } else {
                    status.innerText = "❌ Pacco non esistente su Firebase.";
                }
            } catch (error) {
                console.error(error);
                status.innerText = "❌ Errore di connessione cloud.";
            }

            rimettiInAscolto();
        }

        function rimettiInAscolto() {
            setTimeout(() => {
                isProcessing = false;
                if (!status.innerText.includes("Verifica")) {
                    status.innerText = "Inquadra il prossimo QR Code";
                }
            }, 1500);
        }

        function renderStopsList() {
            const container = document.getElementById('stopList');
            container.innerHTML = "";
            stops.forEach((s, index) => {
                container.innerHTML += `
                    <div class="stop-item-card">
                        <div class="stop-dest-name">👤 ${s.destinatario}</div>
                        <div class="stop-address-text">📍 ${s.address}</div>
                        <div style="display:flex; gap:0.5rem; align-items:center; margin-top:0.25rem;">
                            <span style="font-size:0.75rem; font-weight:600; color:#94a3b8">Fascia Oraria:</span>
                            <input type="text" placeholder="es. 09:00 - 11:00" style="background:#1e293b; color:white; border:1px solid #334155; border-radius:6px; padding:0.3rem; font-size:0.8rem; flex:1; font-family:inherit;" onchange="updateTime(${index}, this.value)">
                        </div>
                    </div>
                `;
            });
        }

        window.updateTime = function(index, value) { 
            stops[index].time = value; 
        };

        window.fineScannerizzazione = function() {
            if (stops.length === 0) {
                alert("Nessun pacco scansionato stamattina.");
                return;
            }

            // Algoritmo di ottimizzazione della rotta (Nearest Neighbor)
            let rottaOttimizzata = ottimizzaPercorsoLogistico(DEPOSITO_START, stops);

            localStorage.setItem(`rar_rotta_ottimizzata_${currentUser}`, JSON.stringify(rottaOttimizzata));
            alert(`Giro ottimizzato correttamente! Create ${rottaOttimizzata.length} tappe stabili.`);
            window.location.href = "spazio-lavoratore.html";
        };

        function ottimizzaPercorsoLogistico(puntoPartenza, listaStops) {
            let insoluti = [...listaStops];
            let percorsoRisolto = [];
            let posizioneAttuale = puntoPartenza;

            while (insoluti.length > 0) {
                let indicePiuVicino = 0;
                let distanzaMinima = Infinity;

                for (let i = 0; i < insoluti.length; i++) {
                    let d = Math.sqrt(Math.pow(posizioneAttuale.lat - insoluti[i].lat, 2) + Math.pow(posizioneAttuale.lon - insoluti[i].lon, 2));
                    if (d < distanzaMinima) {
                        distanzaMinima = d;
                        indicePiuVicino = i;
                    }
                }

                let stopScelto = insoluti.splice(indicePiuVicino, 1)[0];
                percorsoRisolto.push(stopScelto);
                posizioneAttuale = { lat: stopScelto.lat, lon: stopScelto.lon };
            }
            return percorsoRisolto;
        }
    </script>

    <!-- CARICAMENTO DELLE API DI GOOGLE MAPS -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvd_JFOMreUFxPpo-ADU00_Qr3-0B8HeA&callback=initGoogleScanner">
    </script>
</body>
</html>
