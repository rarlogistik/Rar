<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Scanner & Gestione Pacchi</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .split-scanner-container { display: flex; flex-direction: column; min-height: 100vh; max-width: 500px; margin: 0 auto; background: #0f172a; }
        .workspace-area { padding: 1rem; flex: 1; background: #1e293b; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .camera-card { background: #0f172a; border-radius: 16px; padding: 0.75rem; overflow: hidden; margin-bottom: 1rem; border: 1px solid #334155; }
        .camera-viewport { position: relative; width: 100%; height: 160px; background: #000; border-radius: 12px; overflow: hidden; }
        .laser-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 110px; height: 110px; border: 3px solid #f97316; border-radius: 12px; box-shadow: 0 0 0 999px rgba(0,0,0,0.6); pointer-events: none; z-index: 5; }
        .laser-line { position: absolute; width: 100%; height: 2px; background-color: #ef4444; box-shadow: 0 0 8px #ef4444; top: 0; animation: scanRadar 2s infinite ease-in-out; }
        @keyframes scanRadar { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        .manual-entry-card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; padding: 1rem; margin-bottom: 1.5rem; }
        .manual-input { width: 100%; background: #1e293b; border: 1px solid #334155; color: white; padding: 0.6rem; border-radius: 8px; font-family: inherit; margin-bottom: 0.5rem; font-size: 0.85rem; box-sizing: border-box; }
        .manual-input:focus { border-color: #f97316; outline: none; }

        /* Fix grafico suggerimenti Google */
        .pac-container { background-color: #1e293b !important; border: 1px solid #334155 !important; border-radius: 8px; font-family: 'Inter', sans-serif !important; z-index: 9999 !important; }
        .pac-item { color: #cbd5e1 !important; border-top: 1px solid #334155 !important; padding: 0.5rem !important; cursor: pointer; }
        .pac-item:hover { background-color: #293548 !important; }
        .pac-item-query { color: #ffffff !important; }
        .pac-matched { color: #f97316 !important; }

        .stop-item-card { background: #0f172a; border: 1px solid #334155; padding: 1rem; border-radius: 14px; margin-bottom: 0.75rem; display: flex; flex-direction: column; gap: 0.6rem; }
        .stop-address-text { font-size: 0.9rem; font-weight: 700; color: #ffffff; }
        .stop-dest-name { font-size: 0.8rem; font-weight: 600; color: #f97316; text-transform: uppercase; }
        
        .row-actions { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; background: #1e293b; padding: 0.5rem; border-radius: 8px; border: 1px solid #334155; }
        .counter-btn { background: #334155; border: none; color: white; width: 28px; height: 28px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .counter-btn:hover { background: #f97316; }
        
        .photo-preview-slot { width: 45px; height: 45px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        #google-map { width: 100%; height: 250px !important; min-height: 250px !important; border-top: 2px solid #334155; position: relative; }
    </style>
</head>
<body>

    <div class="split-scanner-container">
        <header class="navbar" style="background:#1e293b; border-bottom: 1px solid #334155; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center;">
            <a href="spazio-lavoratore.html" class="logo" style="text-decoration:none; font-weight:800; font-size:1.1rem; color:white;">RAR <span style="color:#f97316;">Logistik</span></a>
            <button onclick="fineScannerizzazione()" style="background:#22c55e; color:white; border:none; border-radius:8px; font-weight:bold; font-size:0.85rem; padding:0.5rem 1rem; cursor:pointer;">🏁 CREA GIRO</button>
        </header>

        <div class="workspace-area">
            <div class="camera-card">
                <div class="camera-viewport">
                    <div id="qr-reader" style="width: 100%; height: 100%;"></div>
                    <div class="laser-box"><div class="laser-line"></div></div>
                </div>
            </div>
            <div id="status" style="text-align:center; font-size:0.8rem; font-weight:700; color:#94a3b8; margin-bottom:1rem; text-transform:uppercase;">Scanner Pronto</div>

            <div class="manual-entry-card">
                <div style="font-size:0.85rem; font-weight:800; color:#f97316; text-transform:uppercase; margin-bottom:0.75rem;">➕ Inserimento Manuale Vie</div>
                <input type="text" id="manDestinatario" class="manual-input" placeholder="Nome Destinatario">
                <!-- Input con Autocompletamento -->
                <input type="text" id="manIndirizzo" class="manual-input" placeholder="Inizia a digitare l'indirizzo...">
                <button onclick="aggiungiViaAmano()" style="width:100%; padding:0.6rem; background:#f97316; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-family:inherit; font-size:0.85rem;">Aggiungi questo Stop</button>
            </div>

            <div style="margin-bottom: 1rem;">
                <div style="display:flex; justify-content:space-between; font-size:0.9rem; font-weight:700; margin-bottom:0.75rem;">
                    <span>📦 Pacchi in Carico</span>
                    <span id="itemsCounter" style="color:#22c55e;">0 Tappe</span>
                </div>
                <div id="stopList"></div>
            </div>
        </div>

        <div id="google-map"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {  
            apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0",  
            authDomain: "rar-logistik-7663d.firebaseapp.com",   
            projectId: "rar-logistik-7663d",    
            storageBucket: "rar-logistik-7663d.firebasestorage.app",    
            messagingSenderId: "657384053565",  
            appId: "1:657384053565:web:fc1e812a80553f1eb08354"  
        };    
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let map, geocoder, autocomplete, html5QrCode;
        let stops = [];
        let isProcessing = false;
        let markers = [];
        let posizioneMagazzinoUgualeGPS = { lat: 46.6249, lng: 14.3053 }; // Fallback Klagenfurt centro

        window.initGoogleScanner = function() {
            geocoder = new google.maps.Geocoder();
            
            // 1. Collegamento Autocomplete di Google sull'input di testo
            autocomplete = new google.maps.places.Autocomplete(document.getElementById('manIndirizzo'), {
                componentRestrictions: { country: "at" }, // Limita la ricerca in Austria per comodità
                fields: ["address_components", "geometry", "formatted_address"]
            });

            map = new google.maps.Map(document.getElementById("google-map"), {
                zoom: 14,
                center: posizioneMagazzinoUgualeGPS,
                disableDefaultUI: true,
                zoomControl: true
            });

            // 2. Chiediamo la geolocalizzazione precisa dell'utente per centrare la mappa
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    posizioneMagazzinoUgualeGPS = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    map.setCenter(posizioneMagazzinoUgualeGPS);
                    
                    // Segnaposto della tua posizione reale attuale
                    new google.maps.Marker({
                        position: posizioneMagazzinoUgualeGPS,
                        map: map,
                        title: "La tua posizione attuale",
                        icon: { path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW, scale: 5, fillColor: "#22c55e", fillOpacity: 1, strokeColor: "#fff" }
                    });
                }, () => console.log("GPS rifiutato o non raggiungibile. Uso default."));
            }

            avviaFotocameraQR();
        };

        function avviaFotocameraQR() {
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 120, height: 120 } }, onScanSuccess)
            .catch(err => console.log("Usa inserimento manuale."));
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true;
            document.getElementById('status').innerText = "Ricerca Spedizione... 🔄";
            try {
                const docSnap = await db.collection("Spedizioni").doc(decodedText.trim()).get();
                if (docSnap.exists) {
                    const data = docSnap.data();
                    if (stops.some(s => s.id === decodedText.trim())) { alert("Pacco già in lista!"); isProcessing = false; return; }

                    geocoder.geocode({ address: data.indirizzo }, (results, geoStatus) => {
                        if (geoStatus === "OK" && results[0]) {
                            creaNuovaTappa(decodedText.trim(), data.destinatario, data.indirizzo, results[0].geometry.location, data.note || "");
                        }
                    });
                } else { alert("Pacco non registrato."); }
            } catch (e) { console.error(e); }
            setTimeout(() => { isProcessing = false; document.getElementById('status').innerText = "Inquadra il QR Code"; }, 1500);
        }

        window.aggiungiViaAmano = function() {
            const dest = document.getElementById('manDestinatario').value.trim();
            const addr = document.getElementById('manIndirizzo').value.trim();

            if(!dest || !addr) { alert("Compila tutti i campi!"); return; }

            document.getElementById('status').innerText = "Verifica indirizzo... 🗺️";

            geocoder.geocode({ address: addr }, (results, geoStatus) => {
                if (geoStatus === "OK" && results[0]) {
                    const fakeId = "MAN_" + Date.now();
                    creaNuovaTappa(fakeId, dest, results[0].formatted_address, results[0].geometry.location, "A mano");
                    
                    document.getElementById('manDestinatario').value = "";
                    document.getElementById('manIndirizzo').value = "";
                    document.getElementById('status').innerText = "Tappa Aggiunta! ✅";
                } else {
                    alert("Indirizzo non trovato.");
                }
            });
        };

        function creaNuovaTappa(id, destinatario, indirizzo, googleLocation, noteIniziali) {
            const t = {
                id: id,
                destinatario: destinatario,
                address: indirizzo,
                notes: noteIniziali,
                quantitaPacchi: 1, 
                fotoRiconoscimento: "", 
                lat: googleLocation.lat(),
                lng: googleLocation.lng(),
                consegnato: false
            };

            stops.push(t);
            document.getElementById('itemsCounter').innerText = `${stops.length} Tappe`;

            const marker = new google.maps.Marker({ position: googleLocation, map: map, title: destinatario });
            markers.push(marker);
            map.setCenter(googleLocation);
            renderStopsList();
        }

        function renderStopsList() {
            const container = document.getElementById('stopList');
            container.innerHTML = "";
            stops.forEach((s, index) => {
                container.innerHTML += `
                    <div class="stop-item-card">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <div class="stop-dest-name">👤 ${s.destinatario}</div>
                                <div class="stop-address-text">📍 ${s.address}</div>
                            </div>
                            <button onclick="rimuoviTappa(${index})" style="background:none; border:none; color:#f87171; font-weight:bold; cursor:pointer;">✕</button>
                        </div>
                        <div class="row-actions">
                            <div style="display:flex; align-items:center; gap:0.5rem;">
                                <span style="font-size:0.75rem; font-weight:700; color:#94a3b8;">COLLI:</span>
                                <button class="counter-btn" onclick="cambiaQuantita(${index}, -1)">-</button>
                                <span style="font-size:0.9rem; font-weight:800;">${s.quantitaPacchi}</span>
                                <button class="counter-btn" onclick="cambiaQuantita(${index}, 1)">+</button>
                            </div>
                            <div style="display:flex; align-items:center; gap:0.5rem;">
                                <label style="background:#334155; padding:0.4rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; cursor:pointer; color:#f1f5f9;">
                                    📷 Foto
                                    <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="scattaFotoPacco(${index}, this)">
                                </label>
                                <div class="photo-preview-slot" id="preview-box-${index}">
                                    ${s.fotoRiconoscimento ? `<img src="${s.fotoRiconoscimento}" style="width:100%; height:100%; object-fit:cover; border-radius:4px;">` : `<span style="font-size:0.6rem; color:#475569;">NO</span>`}
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.cambiaQuantita = function(index, variaz) { stops[index].quantitaPacchi = Math.max(1, stops[index].quantitaPacchi + variaz); renderStopsList(); };
        window.rimuoviTappa = function(index) { markers[index].setMap(null); markers.splice(index, 1); stops.splice(index, 1); document.getElementById('itemsCounter').innerText = `${stops.length} Tappe`; renderStopsList(); };
        window.scattaFotoPacco = function(index, input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { stops[index].fotoRiconoscimento = e.target.result; renderStopsList(); };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.fineScannerizzazione = async function() {
            if (stops.length === 0) { alert("Lista vuota!"); return; }
            let idRotta = prompt("Inserisci il codice numerico della rotta (es. 101):");
            if (!idRotta) return;

            let rottaOttimizzata = ottimizzaPercorsoLogistico(posizioneMagazzinoUgualeGPS, stops);
            try {
                await db.collection("Rotte").doc(idRotta.trim()).set({
                    codiceRotta: idRotta.trim(),
                    dataCreazione: new Date().toLocaleDateString('it-IT'),
                    stato: "Pronta",
                    tappe: rottaOttimizzata
                });
                alert("Rotta salvata sul cloud!");
                window.location.href = "spazio-lavoratore.html";
            } catch (error) { alert("Errore di salvataggio."); }
        };

        function ottimizzaPercorsoLogistico(puntoPartenza, listaStops) {
            let insoluti = [...listaStops]; let percorsoRisolto = []; let posizioneAttuale = puntoPartenza;
            while (insoluti.length > 0) {
                let indicePiuVicino = 0; let distanzaMinima = Infinity;
                for (let i = 0; i < insoluti.length; i++) {
                    let d = Math.sqrt(Math.pow(posizioneAttuale.lat - insoluti[i].lat, 2) + Math.pow(posizioneAttuale.lng - insoluti[i].lng, 2));
                    if (d < distanzaMinima) { distanzaMinima = d; indicePiuVicino = i; }
                }
                let stopScelto = insoluti.splice(indicePiuVicino, 1)[0];
                percorsoRisolto.push(stopScelto);
                posizioneAttuale = { lat: stopScelto.lat, lng: stopScelto.lng };
            }
            return percorsoRisolto;
        }
    </script>
    <!-- NOTA: caricamento librerie estese con "&libraries=places" -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvd_JFOMreUFxPpo-ADU00_Qr3-0B8HeA&libraries=places&callback=initGoogleScanner"></script>
</body>
</html>
