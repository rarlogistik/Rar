<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Navigatore Enterprise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .nav-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: #f8fafc; }
        
        /* Area Mappa Google (Prende tutto lo spazio disponibile) */
        #google-map { flex: 1; width: 100%; position: relative; }

        /* Card di Navigazione Inferiore Professionale */
        .navigation-dashboard { background: white; padding: 1.25rem; border-radius: 24px 24px 0 0; box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1); z-index: 100; position: relative; }
        .route-info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #e2e8f0; }
        .destination-badge { background: #eff6ff; color: #1e40af; padding: 0.35rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        
        .client-info-box { margin-bottom: 1.25rem; }
        .client-name { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-bottom: 0.25rem; text-transform: uppercase; }
        .client-address { font-size: 0.9rem; color: #64748b; font-weight: 600; display: flex; align-items: center; gap: 0.3rem; }
        .driver-notes { background: #fff7ed; border-left: 4px solid #f97316; padding: 0.6rem; border-radius: 0 8px 8px 0; font-size: 0.8rem; color: #7c2d12; font-weight: 600; margin-top: 0.5rem; }

        .action-grid { display: flex; gap: 0.75rem; }
        .btn-success { background: #22c55e; color: white; border: none; border-radius: 12px; padding: 0.85rem; font-weight: 700; flex: 2; display: flex; justify-content: center; align-items: center; gap: 0.5rem; cursor: pointer; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2); font-family: inherit; }
        .btn-external-maps { background: #e2e8f0; color: #334155; border: none; border-radius: 12px; padding: 0.85rem; font-weight: 700; flex: 1; display: flex; justify-content: center; align-items: center; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

    <div class="nav-container">
        
        <!-- HEADER AZIENDALE -->
        <header class="navbar" style="position: relative; z-index: 110;">
            <a href="spazio-lavoratore.html" class="logo">RAR <span>Navigatore</span></a>
            <div id="progressTracker" style="font-size: 0.85rem; font-weight: 700; color: var(--accent);">Tappa 0/0</div>
        </header>

        <!-- AREA MAPPA DI GOOGLE -->
        <div id="google-map"></div>

        <!-- DASHBOARD DI NAVIGAZIONE INFERIORE -->
        <div class="navigation-dashboard">
            <div class="route-info-bar">
                <span class="destination-badge" id="lblStatoPacco">In Consegna</span>
                <div style="text-align: right;">
                    <span style="font-size: 0.75rem; font-weight: 600; color: #94a3b8; display:block;">Orario Richiesto</span>
                    <span id="lblOrarioTappa" style="font-size: 0.9rem; font-weight: 700; color: #334155;">--:--</span>
                </div>
            </div>

            <div class="client-info-box">
                <div class="client-name" id="lblNomeCliente">Caricamento Rotta...</div>
                <div class="client-address">
                    <span>📍</span> <span id="lblIndirizzoCliente">Nessun indirizzo selezionato</span>
                </div>
                <div class="driver-notes" id="boxNote">
                    <b>Nota Driver:</b> <span id="lblNoteCliente">Nessuna nota presente</span>
                </div>
            </div>

            <!-- PULSANTI OPERATIVI -->
            <div class="action-grid">
                <button onclick="apriNavigatoreEsterno()" class="btn-external-maps" title="Apri in Google Maps Esterno">
                    🗺️ Apri App
                </button>
                <button onclick="consegnaCompletataCloud()" class="btn-success">
                    Consegna Completata ✓
                </button>
            </div>
        </div>

    </div>

    <!-- Script di logica e connessione a Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {  
            apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0",  
            authDomain: "rar-logistik-7663d.firebaseapp.com",   
            projectId: "rar-logistik-7663d",    
            storageBucket: "rar-logistik-7663d.firebasestorage.app",    
            messagingSenderId: "657384053565",  
            appId: "1:657384053565:web:fc1e812a80553f1eb08354"  
        };    

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let map;
        let directionsService;
        let directionsRenderer;
        let rottaOttimizzata = [];
        let tappaAttualeIndex = 0;
        let currentUser = localStorage.getItem('rar_active_user') || "Ospite";
        let userMarker;

        // Inizializzazione di Google Maps scatenata dalla callback delle API di Google
        window.initMap = function() {
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                polylineOptions: {
                    strokeColor: "#f97316", // Il nostro arancione RAR Logistik per il percorso stradale
                    strokeWeight: 5
                },
                markerOptions: {
                    animation: google.maps.Animation.DROP
                }
            });

            // Mappa centrata inizialmente sull'Austria / Carinzia
            map = new google.maps.Map(document.getElementById("google-map"), {
                zoom: 12,
                center: { lat: 46.6249, lng: 14.3053 },
                mapId: "RAR_MAP_STYLE", // Opzionale per stili personalizzati
                disableDefaultUI: true,
                zoomControl: true
            });

            directionsRenderer.setMap(map);

            // Carichiamo la rotta salvata dallo scanner della mattina
            const salvataggio = localStorage.getItem(`rar_rotta_ottimizzata_${currentUser}`);
            if (salvataggio) {
                rottaOttimizzata = JSON.parse(salvataggio);
                aggiornaSchermataTappa();
                tracciaPercorsoGoogle();
            } else {
                document.getElementById('lblNomeCliente').innerText = "Nessuna rotta attiva";
            }

            // Avvia la localizzazione GPS in background del driver
            avviaTracciamentoGPS();
        };

        // Calcola e disegna il percorso reale su strada usando le Directions API di Google
        function tracciaPercorsoGoogle() {
            if (rottaOttimizzata.length === 0) return;

            const tappaCorrente = rottaOttimizzata[tappaAttualeIndex];

            // Localizziamo la posizione del driver per calcolare la strada da dove si trova adesso
            navigator.geolocation.getCurrentPosition((position) => {
                const origine = { lat: position.coords.latitude, lng: position.coords.longitude };
                const destinazione = { lat: parseFloat(tappaCorrente.lat), lng: parseFloat(tappaCorrente.lon) };

                directionsService.route({
                    origin: origine,
                    destination: destinazione,
                    travelMode: google.maps.TravelMode.DRIVING
                }, (response, status) => {
                    if (status === "OK") {
                        directionsRenderer.setDirections(response);
                    } else {
                        console.error("Errore nel calcolo del percorso stradale: " + status);
                    }
                });
            }, () => {
                alert("Attiva il GPS per vedere il percorso stradale esatto.");
            }, { enableHighAccuracy: true });
        }

        function aggiornaSchermataTappa() {
            if (tappaAttualeIndex >= rottaOttimizzata.length) {
                document.getElementById('lblNomeCliente').innerText = "Giro Completato! 🎉";
                document.getElementById('lblIndirizzoCliente').innerText = "Tutti i pacchi sono stati consegnati.";
                document.getElementById('boxNote').style.display = 'none';
                document.getElementById('progressTracker').innerText = "Fatto ✅";
                return;
            }

            const t = rottaOttimizzata[tappaAttualeIndex];
            document.getElementById('lblNomeCliente').innerText = t.destinatario;
            document.getElementById('lblIndirizzoCliente').innerText = t.address;
            document.getElementById('lblOrarioTappa').innerText = t.time || "Nessuno";
            document.getElementById('lblNoteCliente').innerText = t.note || "Nessuna nota per questa consegna";
            document.getElementById('progressTracker').innerText = `Tappa ${tappaAttualeIndex + 1}/${rottaOttimizzata.length}`;
        }

        // AGGIORNA IN TEMPO REALE IL DATABASE CLOUD QUANDO IL CORRIERE CONSEGNA IL PACCO
        window.consegnaCompletataCloud = async function() {
            if (tappaAttualeIndex >= rottaOttimizzata.length) return;

            const tappaCorrente = rottaOttimizzata[tappaAttualeIndex];
            
            // Chiediamo la posizione esatta per salvarla come prova di consegna
            navigator.geolocation.getCurrentPosition(async (position) => {
                const latConsegna = position.coords.latitude;
                const lonConsegna = position.coords.longitude;

                try {
                    // Aggiorniamo il pacco su Firebase usando il suo ID unico documentale
                    const docRef = doc(db, "Spedizioni", tappaCorrente.id);
                    await updateDoc(docRef, {
                        stato: "Consegnato",
                        oraConsegna: new Date().toLocaleTimeString('it-IT'),
                        driver: currentUser,
                        coordinateConsegna: { lat: latConsegna, lon: lonConsegna }
                    });

                    alert(`Pacco per ${tappaCorrente.destinatario} registrato come Consegnato con successo! ✅`);

                    // Avanziamo alla prossima tappa del giro
                    tappaAttualeIndex++;
                    aggiornaSchermataTappa();
                    tracciaPercorsoGoogle();

                    // Aggiorniamo la memoria locale del telefono
                    localStorage.setItem(`rar_rotta_ottimizzata_${currentUser}`, JSON.stringify(rottaOttimizzata));

                } catch (error) {
                    console.error("Errore nell'invio a Firebase: ", error);
                    alert("Errore nel salvataggio della consegna nel Cloud.");
                }
            }, () => {
                alert("Impossibile salvare la consegna senza coordinate GPS.");
            });
        };

        // Funzione di supporto per lanciare la navigazione nativa sul telefono del driver
        window.apriNavigatoreEsterno = function() {
            if (tappaAttualeIndex >= rottaOttimizzata.length) return;
            const t = rottaOttimizzata[tappaAttualeIndex];
            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.address)}`;
            window.open(url, '_blank');
        };

        // Mostra la posizione in movimento del furgone sulla mappa
        function avviaTracciamentoGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
                    
                    if (userMarker) {
                        userMarker.setPosition(pos);
                    } else {
                        // Creiamo un marker blu per la posizione in tempo reale del driver
                        userMarker = new google.maps.Marker({
                            position: pos,
                            map: map,
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 7,
                                fillColor: "#3b82f6",
                                fillOpacity: 1,
                                strokeColor: "#ffffff",
                                strokeWeight: 2
                            },
                            title: "Il tuo furgone"
                        });
                    }
                }, (err) => console.log(err), { enableHighAccuracy: true });
            }
        }
    </script>

    <!-- IL TUO SCRIPT DI CARICAMENTO GOOGLE MAPS REALE -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvd_JFOMreUFxPpo-ADU00_Qr3-0B8HeA&callback=initMap">
    </script>      
</body>
</html>
