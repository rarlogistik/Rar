
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Navigatore Live 3D</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .nav-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: #0f172a; }
        #google-map { width: 100%; flex: 1; min-height: 300px; position: relative; }
        
        /* TASTO FLOTTANTE RECENTER */
        #btnRecenter {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background: #1e293b; border: 2px solid #334155; color: white;
            padding: 10px 15px; border-radius: 50px; font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none;
        }

        .navigation-panel { background: #1e293b; border-top: 2px solid #334155; padding: 1.25rem; border-top-left-radius: 24px; border-top-right-radius: 24px; box-shadow: 0 -10px 25px rgba(0,0,0,0.3); z-index: 10; }
        .driving-info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .eta-box { font-size: 1.8rem; font-weight: 800; color: #4ade80; }
        .km-box { font-size: 1.1rem; font-weight: 600; color: #94a3b8; }
        .address-box { font-size: 0.95rem; font-weight: 700; color: #ffffff; margin-bottom: 1rem; }
        
        .btn-action { width: 100%; padding: 1.1rem; border: none; border-radius: 14px; font-size: 1rem; font-weight: 800; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: background 0.2s; }
        .btn-start-nav { background: #f97316; color: white; }
        .btn-parked { background: #3b82f6; color: white; }
        .btn-consegna { background: #22c55e; color: white; }

        .pacco-details-card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; padding: 1rem; margin-bottom: 1rem; max-height: 250px; overflow-y: auto; }
        .pacco-label { font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .pacco-value { font-size: 1.05rem; font-weight: 800; color: #ffffff; }
        
        .consegna-options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
        .option-btn { background: #293548; border: 1px solid #334155; color: white; padding: 1rem 0.5rem; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.85rem; text-align: center; }
        
        .input-text-premium { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 0.65rem; border-radius: 8px; box-sizing: border-box; margin-bottom: 0.75rem; }
        #signature-canvas { background: #ffffff; border: 2px dashed #cbd5e1; border-radius: 8px; width: 100%; height: 100px; box-sizing: border-box; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="nav-container">
        <header class="navbar" style="background:#1e293b; border-bottom: 1px solid #334155; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center;">
            <a href="spazio-lavoratore.html" class="logo" style="text-decoration:none; font-weight:800; color:white;">RAR <span style="color:#f97316;">Logistik</span></a>
            <div id="lblStopAttuale" style="font-weight: 700; font-size: 0.85rem; color: #94a3b8;">Rotta RAR</div>
        </header>

        <div id="google-map">
            <button id="btnRecenter" onclick="riattivaSeguiFurgone()">📍</button>
        </div>

        <div class="navigation-panel">
            <div class="address-box">
                <span style="color: #f97316;" id="lblStatoTarget">Prossima Tappa:</span>
                <span id="txtIndirizzoTarget">--</span>
            </div>

            <div id="panelPanoramica">
                <div class="driving-info-row">
                    <div class="eta-box" id="txtPanETA">-- Min</div>
                    <div class="km-box" id="txtPanKm">-- km</div>
                </div>
                <button onclick="avviaNavigazioneLive()" class="btn-action btn-start-nav">▶️ Avvia Navigazione</button>
            </div>

            <div id="panelInViaggio" class="hidden">
                <div class="driving-info-row">
                    <div class="eta-box" id="txtETA">-- Min</div>
                    <div class="km-box" id="txtKmRimanenti">-- km</div>
                </div>
                <button onclick="fermaArrivatoSulPosto()" class="btn-action btn-parked">🅿️ SONO ARRIVATO SUL POSTO</button>
            </div>

            <div id="panelArrivato" class="hidden">
                <div class="pacco-details-card">
                    <div class="pacco-label">👤 Destinatario</div>
                    <div class="pacco-value" id="txtNomeDestinatario">---</div>
                    <button onclick="selezionaEsito('mano')" class="option-btn" style="width:100%; margin-top:10px;">🤝 Conferma Consegna</button>
                </div>
                <button id="btnSalvaChiusura" onclick="concludiEInviaEsito()" class="btn-action btn-consegna hidden">💾 Salva Chiusura</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0", authDomain: "rar-logistik-7663d.firebaseapp.com", projectId: "rar-logistik-7663d", storageBucket: "rar-logistik-7663d.firebasestorage.app", messagingSenderId: "657384053565", appId: "1:657384053565:web:fc1e812a80553f1eb08354" };    
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let map, directionsService;
        let rigaTracciatoArancione = null; 
        let rotta = [];
        let indiceAttuale = 0;
        let idRottaGlobale = "";
        let markerFurgone = null;
        let watchId = null;
        let posizioneFurgoneGPS = { lat: 46.6249, lng: 14.3053 };
        
        // Nuove variabili di controllo
        let isFollowing = false; 
        let ultimoHeading = 0;

        async function initMapNavigatore() {
            directionsService = new google.maps.DirectionsService();
            const { Map } = await google.maps.importLibrary("maps");

            map = new Map(document.getElementById("google-map"), {
                zoom: 15, center: posizioneFurgoneGPS, disableDefaultUI: true,
                mapId: "DEMO_MAP_ID", renderingType: google.maps.RenderingType.VECTOR,
                gestureHandling: "greedy"
            });

            // Sblocco interazione: se l'utente tocca la mappa, disattiviamo l'auto-lock
            map.addListener('dragstart', () => { isFollowing = false; document.getElementById('btnRecenter').style.display = 'block'; });

            rigaTracciatoArancione = new google.maps.Polyline({ strokeColor: "#f97316", strokeOpacity: 1.0, strokeWeight: 6, map: map });
            markerFurgone = new google.maps.Marker({ position: posizioneFurgoneGPS, map: map, icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 7, fillColor: "#3b82f6", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2 } });

            scaricaRottaAssegnata();
        }

        window.riattivaSeguiFurgone = function() {
            isFollowing = true;
            document.getElementById('btnRecenter').style.display = 'none';
        };

        window.avviaNavigazioneLive = function() {
            document.getElementById('panelPanoramica').classList.add('hidden');
            document.getElementById('panelInViaggio').classList.remove('hidden');
            isFollowing = true;

            watchId = navigator.geolocation.watchPosition((position) => {
                posizioneFurgoneGPS = { lat: position.coords.latitude, lng: position.coords.longitude };
                markerFurgone.setPosition(posizioneFurgoneGPS);

                // Calcolo Heading (Direzione)
                let heading = position.coords.heading;
                if (heading !== null && !isNaN(heading)) ultimoHeading = heading;

                // Se siamo in modalità "Segui", muovi camera
                if (isFollowing) {
                    map.moveCamera({
                        center: posizioneFurgoneGPS,
                        zoom: 19,
                        tilt: 65,
                        heading: ultimoHeading
                    });
                }
            }, null, { enableHighAccuracy: true });
        };

        // ... (resto delle funzioni di chiusura consegna, firma, foto)
        async function scaricaRottaAssegnata() { /* ... codice esistente ... */ }
        function mostraPanoramicaStatico() { /* ... codice esistente ... */ }
        function fermaArrivatoSulPosto() { /* ... codice esistente ... */ }
        function concludiEInviaEsito() { /* ... codice esistente ... */ }
    </script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvd_JFOMreUFxPpo-ADU00_Qr3-0B8HeA&v=beta&callback=initMapNavigatore"></script>
</body>
</html>
