<!DOCTYPE html>
<html lang="it">
<head>
    <link rel=¨manifest¨ href=¨manifest.json¨>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Navigatore Live 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --bg-card: #1e293b; --orange-rar: #f97316; --text-light: #f8fafc; --text-muted: #94a3b8; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .nav-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: var(--bg-dark); position: relative; }
        
        .map-wrapper { width: 100%; flex: 1; position: relative; }
        #google-map { width: 100%; height: 100%; position: relative; }

        /* TASTO FLOTTANTE RECENTER */
        #btnRecenter {
            position: absolute; bottom: 20px; right: 20px; z-index: 100;
            background: #1e293b; border: 2px solid #334155; color: white;
            padding: 12px 16px; border-radius: 50px; font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: none; font-size: 1.1rem;
        }
        
        /* Aggiunto padding-bottom generoso per evitare il taglio del pulsante su schermi piccoli */
        .navigation-panel { background: var(--bg-card); border-top: 2px solid #334155; padding: 1.25rem 1.25rem 2.5rem 1.25rem; border-top-left-radius: 24px; border-top-right-radius: 24px; box-shadow: 0 -10px 25px rgba(0,0,0,0.3); z-index: 10; }
        .driving-info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .eta-box { font-size: 1.8rem; font-weight: 800; color: #4ade80; }
        .km-box { font-size: 1.1rem; font-weight: 600; color: var(--text-muted); }
        .address-box { font-size: 0.95rem; font-weight: 700; color: #ffffff; margin-bottom: 1rem; }
        
        .btn-action { width: 100%; padding: 1.1rem; border: none; border-radius: 14px; font-size: 1rem; font-weight: 800; font-family: inherit; cursor: pointer; text-transform: uppercase; color: white; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; }
        .btn-start-nav { background: var(--orange-rar); }
        .btn-parked { background: #3b82f6; transition: background 0.3s, opacity 0.3s; }
        .btn-parked:disabled { background: #475569; opacity: 0.5; cursor: not-allowed; }
        .btn-consegna { background: #22c55e; }

        .pacco-details-card { background: var(--bg-dark); border: 1px solid #334155; border-radius: 16px; padding: 1rem; margin-bottom: 1rem; max-height: 250px; overflow-y: auto; }
        .pacco-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .pacco-value { font-size: 1.05rem; font-weight: 800; color: #ffffff; }
        
        .consegna-options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
        .option-btn { background: #293548; border: 1px solid #334155; color: white; padding: 1rem 0.5rem; border-radius: 12px; font-weight: 700; text-align: center; cursor: pointer; }
        
        .input-text-premium { width: 100%; background: var(--bg-dark); border: 1px solid #334155; color: white; padding: 0.8rem; border-radius: 8px; font-family: inherit; margin-bottom: 0.75rem; box-sizing: border-box; }
        #signature-canvas { background: #ffffff; border: 2px dashed #cbd5e1; border-radius: 8px; cursor: crosshair; display: block; width: 100%; height: 100px; }
        
        .modal-overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: var(--bg-card); padding: 2rem; border-radius: 20px; width: 85%; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
        .modal-box h3 { margin-top: 0; color: var(--orange-rar); }
        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 1rem 1.5rem; border-radius: 30px; font-weight: 700; z-index: 10000; transition: top 0.4s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .toast.show { top: 20px; }
        .toast.error { background: #ef4444; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="toastMessage" class="toast">Notifica</div>

    <div id="modalRotta" class="modal-overlay">
        <div class="modal-box">
            <h3>Cerca Rotta</h3>
            <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 1.5rem;">Inserisci il codice della rotta assegnata per iniziare il turno.</p>
            <input type="text" id="inputCodiceRotta" class="input-text-premium" placeholder="Es. 101" style="text-align:center; font-size:1.2rem; font-weight:bold;">
            <button onclick="confermaCaricamentoRotta()" class="btn-action btn-start-nav">Scarica dal Cloud</button>
        </div>
    </div>

    <div class="nav-container">
        <header style="background:#1e293b; border-bottom: 1px solid #334155; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 20;">
            <div style="font-weight:800; color:white;">RAR <span style="color:#f97316;">Logistik</span></div>
            <div id="lblStopAttuale" style="font-weight: 700; font-size: 0.85rem; color: #94a3b8;">--</div>
        </header>

        <div class="map-wrapper">
            <div id="google-map"></div>
            <!-- Pulsante rimesso al suo posto -->
            <button id="btnRecenter" onclick="riattivaSeguiFurgone()">🎯 Ricaltra</button>
        </div>

        <div class="navigation-panel">
            <div class="address-box">
                <span style="color: #f97316;" id="lblStatoTarget">Prossima Tappa:</span>
                <span id="txtIndirizzoTarget">--</span>
            </div>

            <div id="panelPanoramica" class="hidden">
                <div class="driving-info-row">
                    <div class="eta-box" id="txtPanETA">-- Min</div>
                    <div class="km-box" id="txtPanKm">-- km</div>
                </div>
                <button onclick="avviaNavigazioneLive()" class="btn-action btn-start-nav">▶️ Avvia Navigazione</button>
            </div>

            <div id="panelInViaggio" class="hidden">
                <div class="driving-info-row">
                    <div class="eta-box" id="txtETA">-- Min</div>
                    <div class="km-box" id="txtKmRimanenti">-- km</div>
                </div>
                
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; font-weight: 700; margin-bottom: 1rem;">
                    <span>🛑 STOP RIMANENTI: <span id="lblStopRimanenti" style="color:#f97316;">-</span></span>
                    <span>🕒 ETA FINE: <span id="lblETAEndTour" style="color:#f97316;">--:--</span></span>
                </div>
                
                <button id="btnArrivato" onclick="fermaArrivatoSulPosto()" class="btn-action btn-parked" disabled>🅿️ RICERCA POSIZIONE...</button>
            </div>

            <div id="panelArrivato" class="hidden">
                <div class="pacco-details-card">
                    <div class="pacco-label">👤 Destinatario</div>
                    <div class="pacco-value" id="txtNomeDestinatario">---</div>
                    <div class="pacco-label">📦 Colli in Consegna</div>
                    <div class="pacco-value" id="txtNumeroColli" style="color:#f97316;">1</div>

                    <div id="boxSceltaEsito">
                        <div class="pacco-label">Esito Chiusura:</div>
                        <div class="consegna-options-grid">
                            <button onclick="selezionaEsito('mano')" class="option-btn">🤝 A Mani</button>
                            <button onclick="selezionaEsito('sicuro')" class="option-btn">🔒 Posto Sicuro</button>
                        </div>
                    </div>

                    <div id="boxEsitoMano" class="hidden">
                        <div class="pacco-label">Nome ricevente:</div>
                        <input type="text" id="txtNomeRicevente" class="input-text-premium" placeholder="Es. Mario Rossi">
                        <div class="pacco-label">Firma:</div>
                        <canvas id="signature-canvas"></canvas>
                        <button onclick="pulisciFirma()" style="background:none; border:none; color:#f87171; cursor:pointer;">🧹 Cancella</button>
                    </div>

                    <div id="boxEsitoSicuro" class="hidden">
                        <div class="pacco-label">Foto Prova Consegna:</div>
                        <label class="btn-action" style="background:#334155; margin-bottom:0.5rem;">
                            📷 Scatta Foto
                            <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="gestisciFoto(this)">
                        </label>
                        <div id="txtStatoFoto" style="font-size:0.8rem; color:#4ade80; text-align:center;"></div>
                    </div>
                </div>

                <button id="btnSalvaChiusura" onclick="concludiEInviaEsito()" class="btn-action btn-consegna hidden">💾 Salva nel Cloud</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {  
            apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0",  
            authDomain: "rar-logistik-7663d.firebaseapp.com",   
            projectId: "rar-logistik-7663d",    
            storageBucket: "rar-logistik-7663d.firebasestorage.app",    
            messagingSenderId: "657384053565",  
            appId: "1:657384053565:web:fc1e812a80553f1eb08354"  
        };    
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let map, directionsService;
        let rotta = [], indiceAttuale = 0, idRottaGlobale = "";
        let markerFurgone, markerDestinazione, rigaTracciatoArancione;
        let posizioneFurgoneGPS = { lat: 46.6249, lng: 14.3053 };
        let coordinateEffettiveArrivo = null;
        let watchId = null, modalitaGuidaAttiva = false;
        let isFollowing = false; // Variabile per lo sblocco dita rimessa
        let ultimoHeadingValido = 0;
        let canvas, ctx, drawing = false;
        let tipoEsitoSelezionato = "", fotoPostoSicuroBase64 = "";

        function mostraToast(msg, isError = false) {
            const t = document.getElementById('toastMessage');
            t.innerText = msg;
            t.className = `toast show ${isError ? 'error' : ''}`;
            setTimeout(() => t.className = 'toast', 3500);
        }

        async function initMapNavigatore() {
            directionsService = new google.maps.DirectionsService();
            const { Map } = await google.maps.importLibrary("maps");

            map = new Map(document.getElementById("google-map"), {
                zoom: 15, center: posizioneFurgoneGPS, disableDefaultUI: true,
                mapId: "DEMO_MAP_ID", renderingType: google.maps.RenderingType.VECTOR, gestureHandling: "greedy"
            });

            // LOGICA SBLOCCO MAPPA CON LE DITA RIMESSA
            map.addListener('dragstart', () => {
                if (!modalitaGuidaAttiva) return;
                isFollowing = false;
                document.getElementById('btnRecenter').style.display = 'block';
            });

            rigaTracciatoArancione = new google.maps.Polyline({ strokeColor: "#f97316", strokeWeight: 6, map: map });

            markerFurgone = new google.maps.Marker({ position: posizioneFurgoneGPS, map: map, zIndex: 10, icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 7, fillColor: "#3b82f6", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2 } });
            markerDestinazione = new google.maps.Marker({ position: posizioneFurgoneGPS, map: map, zIndex: 5, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 9, fillColor: "#22c55e", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2 } });

            inizializzaDisegnoFirma();
            document.getElementById('modalRotta').classList.remove('hidden');
        }

        window.riattivaSeguiFurgone = function() {
            isFollowing = true;
            document.getElementById('btnRecenter').style.display = 'none';
            map.moveCamera({
                center: posizioneFurgoneGPS,
                zoom: 19,
                tilt: 65,
                heading: ultimoHeadingValido
            });
        };

        function calcolaAngoloDirezione(daPunto, aPunto) {
            let dLng = (aPunto.lng() - daPunto.lng);
            let dLat = (aPunto.lat() - daPunto.lat);
            let gradi = Math.atan2(dLng, dLat) * 180 / Math.PI;
            return (gradi + 360) % 360;
        }

        async function confermaCaricamentoRotta() {
            const input = document.getElementById('inputCodiceRotta').value.trim();
            if (!input) { mostraToast("Inserisci un codice valido!", true); return; }
            
            document.getElementById('modalRotta').classList.add('hidden');
            idRottaGlobale = input;
            mostraToast("Ricerca rotta in corso...");

            try {
                const docSnap = await db.collection("Rotte").doc(idRottaGlobale).get();
                if (docSnap.exists) {
                    rotta = docSnap.data().tappe || [];
                    indiceAttuale = rotta.findIndex(stop => !stop.consegnato);
                    if (indiceAttuale === -1) { mostraToast("Rotta già completata!", true); setTimeout(()=>location.reload(), 2000); return; }
                    
                    // Salva il nome dell'autista nel database
                    let driverName = localStorage.getItem('RAR_User') || 'Autista Sconosciuto';
                    await db.collection("Rotte").doc(idRottaGlobale).update({ autista: driverName });
                    
                    mostraToast("Rotta scaricata con successo!");
                    avviaGPSIniziale();
                } else { 
                    mostraToast("Nessuna rotta trovata con questo ID.", true); 
                    document.getElementById('modalRotta').classList.remove('hidden');
                }
            } catch (e) { mostraToast("Errore di connessione", true); }
        }

        function avviaGPSIniziale() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    posizioneFurgoneGPS = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    markerFurgone.setPosition(posizioneFurgoneGPS);
                    impostaPanoramica();
                }, () => impostaPanoramica());
            } else { impostaPanoramica(); }
        }

        function impostaPanoramica() {
            modalitaGuidaAttiva = false;
            isFollowing = false;
            document.getElementById('btnRecenter').style.display = 'none';

            const stop = rotta[indiceAttuale];
            document.getElementById('lblStopAttuale').innerText = `Tappa ${indiceAttuale + 1}/${rotta.length}`;
            document.getElementById('txtIndirizzoTarget').innerText = stop.address;
            
            document.getElementById('panelPanoramica').classList.remove('hidden');
            document.getElementById('panelInViaggio').classList.add('hidden');
            document.getElementById('panelArrivato').classList.add('hidden');

            map.setTilt(0); map.setHeading(0); map.setCenter(posizioneFurgoneGPS);
            markerDestinazione.setPosition({ lat: stop.lat, lng: stop.lng });

            directionsService.route({
                origin: posizioneFurgoneGPS, destination: { lat: stop.lat, lng: stop.lng }, travelMode: google.maps.TravelMode.DRIVING
            }, (res, status) => {
                if (status === "OK") {
                    let percorsoDettagliato = [];
                    res.routes[0].legs[0].steps.forEach(step => {
                        step.path.forEach(punto => percorsoDettagliato.push(punto));
                    });
                    rigaTracciatoArancione.setPath(percorsoDettagliato);

                    document.getElementById('txtPanKm').innerText = res.routes[0].legs[0].distance.text;
                    document.getElementById('txtPanETA').innerText = res.routes[0].legs[0].duration.text;
                    map.fitBounds(res.routes[0].bounds);
                }
            });
        }

        window.avviaNavigazioneLive = function() {
            document.getElementById('panelPanoramica').classList.add('hidden');
            document.getElementById('panelInViaggio').classList.remove('hidden');
            modalitaGuidaAttiva = true;
            isFollowing = true;

            setTimeout(() => { map.moveCamera({ center: posizioneFurgoneGPS, zoom: 19, tilt: 65 }); }, 200);

            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition((pos) => {
                    if (!modalitaGuidaAttiva) return;
                    posizioneFurgoneGPS = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    markerFurgone.setPosition(posizioneFurgoneGPS);
                    
                    let targetLatLng = new google.maps.LatLng(rotta[indiceAttuale].lat, rotta[indiceAttuale].lng);
                    let currentLatLng = new google.maps.LatLng(posizioneFurgoneGPS.lat, posizioneFurgoneGPS.lng);
                    
                    let distanzaMetri = google.maps.geometry.spherical.computeDistanceBetween(currentLatLng, targetLatLng);
                    let btn = document.getElementById('btnArrivato');
                    
                    if (distanzaMetri <= 400) {
                        btn.disabled = false;
                        btn.innerText = "🅿️ SONO ARRIVATO SUL POSTO";
                    } else {
                        btn.disabled = true;
                        btn.innerText = `🅿️ A ${Math.round(distanzaMetri)}m DAL POSTO`;
                    }

                    let velocita = pos.coords.speed; 
                    if (velocita && velocita > 0.8 && pos.coords.heading !== null && !isNaN(pos.coords.heading)) {
                        ultimoHeadingValido = pos.coords.heading;
                    }

                    if (isFollowing) {
                        map.moveCamera({ center: posizioneFurgoneGPS, tilt: 65, heading: ultimoHeadingValido });
                    }

                    let rimasti = rotta.filter(s => !s.consegnato).length;
                    document.getElementById('lblStopRimanenti').innerText = rimasti;
                    
                    directionsService.route({ origin: posizioneFurgoneGPS, destination: targetLatLng, travelMode: google.maps.TravelMode.DRIVING }, (res, status) => {
                        if (status === "OK") {
                            let percorsoDettagliato = [];
                            res.routes[0].legs[0].steps.forEach(step => {
                                step.path.forEach(punto => percorsoDettagliato.push(punto));
                            });
                            rigaTracciatoArancione.setPath(percorsoDettagliato);

                            if ((!velocita || velocita <= 0.8) && percorsoDettagliato.length > 1) {
                                ultimoHeadingValido = calcolaAngoloDirezione(posizioneFurgoneGPS, percorsoDettagliato[1]);
                                if (isFollowing) map.moveCamera({ heading: ultimoHeadingValido });
                            }

                            document.getElementById('txtKmRimanenti').innerText = res.routes[0].legs[0].distance.text;
                            document.getElementById('txtETA').innerText = res.routes[0].legs[0].duration.text;
                        }
                    });
                }, null, { enableHighAccuracy: true });
            }
        };

        window.fermaArrivatoSulPosto = function() {
            modalitaGuidaAttiva = false;
            isFollowing = false;
            document.getElementById('btnRecenter').style.display = 'none';
            coordinateEffettiveArrivo = { ...posizioneFurgoneGPS }; 
            if (watchId) navigator.geolocation.clearWatch(watchId);
            
            document.getElementById('panelInViaggio').classList.add('hidden');
            document.getElementById('panelArrivato').classList.remove('hidden');
            
            const stop = rotta[indiceAttuale];
            document.getElementById('txtNomeDestinatario').innerText = stop.destinatario || "Cliente";
            document.getElementById('txtNumeroColli').innerText = stop.quantitaPacchi || 1;
        };

        window.selezionaEsito = function(tipo) {
            tipoEsitoSelezionato = tipo;
            document.getElementById('boxSceltaEsito').classList.add('hidden');
            document.getElementById('btnSalvaChiusura').classList.remove('hidden');
            if (tipo === 'mano') document.getElementById('boxEsitoMano').classList.remove('hidden');
            else document.getElementById('boxEsitoSicuro').classList.remove('hidden');
        };

        window.gestisciFoto = function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { fotoPostoSicuroBase64 = e.target.result; document.getElementById('txtStatoFoto').innerText = "📸 Acquisita!"; };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.concludiEInviaEsito = async function() {
            let dettagli = {};
            if (tipoEsitoSelezionato === 'mano') {
                const n = document.getElementById('txtNomeRicevente').value.trim();
                if(!n) { mostraToast("Inserisci il nome!", true); return; }
                dettagli = { esito: "A mani", persona: n, firma: canvas.toDataURL() };
            } else {
                if(!fotoPostoSicuroBase64) { mostraToast("Scatta la foto!", true); return; }
                dettagli = { esito: "Posto Sicuro", fotoProva: fotoPostoSicuroBase64 };
            }

            mostraToast("Salvataggio nel Cloud in corso...");
            document.getElementById('btnSalvaChiusura').disabled = true;

            const stopInfo = rotta[indiceAttuale];
            
            try {
                await db.collection("SpedizioniEffettuate").add({
                    idRotta: idRottaGlobale,
                    indirizzo: stopInfo.address,
                    destinatario: stopInfo.destinatario || "Sconosciuto",
                    dataConsegna: new Date().toISOString(),
                    coordinateArrivo: coordinateEffettiveArrivo,
                    colli: stopInfo.quantitaPacchi || 1,
                    dettagliEsito: dettagli
                });

                rotta[indiceAttuale].consegnato = true;
                rotta[indiceAttuale].reportConsegna = dettagli;
                await db.collection("Rotte").doc(idRottaGlobale).update({ tappe: rotta });

                let prox = rotta.findIndex(s => !s.consegnato);
                if (prox === -1) {
                    mostraToast("Rotta Completata! Ottimo lavoro.");
                    setTimeout(() => window.location.reload(), 3000);
                } else {
                    mostraToast("Tappa salvata nel Cloud!");
                    indiceAttuale = prox;
                    document.getElementById('boxEsitoMano').classList.add('hidden');
                    document.getElementById('boxEsitoSicuro').classList.add('hidden');
                    document.getElementById('boxSceltaEsito').classList.remove('hidden');
                    document.getElementById('btnSalvaChiusura').classList.add('hidden');
                    document.getElementById('btnSalvaChiusura').disabled = false;
                    rigaTracciatoArancione.setPath([]); 
                    impostaPanoramica();
                }
            } catch(e) { mostraToast("Errore di rete", true); document.getElementById('btnSalvaChiusura').disabled = false; }
        };

        function inizializzaDisegnoFirma() {
            canvas = document.getElementById('signature-canvas'); ctx = canvas.getContext('2d');
            ctx.lineWidth = 3;
            const draw = (e) => { if(drawing) { ctx.lineTo(e.offsetX || e.touches[0].clientX - canvas.getBoundingClientRect().left, e.offsetY || e.touches[0].clientY - canvas.getBoundingClientRect().top); ctx.stroke(); } e.preventDefault(); };
            canvas.onmousedown = canvas.ontouchstart = e => { drawing = true; ctx.beginPath(); draw(e); };
            canvas.onmousemove = canvas.ontouchmove = draw;
            window.onmouseup = canvas.ontouchend = () => drawing = false;
        }
        window.pulisciFirma = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
    </script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvd_JFOMreUFxPpo-ADU00_Qr3-0B8HeA&v=beta&libraries=places,geometry&callback=initMapNavigatore"></script>
</body>
</html>
