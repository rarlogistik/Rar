<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Navigatore Stabilizzato 3D</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .nav-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: #0f172a; }
        #google-map { width: 100%; flex: 1; min-height: 300px; }
        
        .navigation-panel { background: #1e293b; border-top: 2px solid #334155; padding: 1.25rem; border-top-left-radius: 24px; border-top-right-radius: 24px; box-shadow: 0 -10px 25px rgba(0,0,0,0.3); z-index: 10; }
        .driving-info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .eta-box { font-size: 1.8rem; font-weight: 800; color: #4ade80; }
        .km-box { font-size: 1.1rem; font-weight: 600; color: #94a3b8; }
        .address-box { font-size: 0.95rem; font-weight: 700; color: #ffffff; margin-bottom: 1rem; }
        
        .btn-action { width: 100%; padding: 1.1rem; border: none; border-radius: 14px; font-size: 1rem; font-weight: 800; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-start-nav { background: #f97316; color: white; }
        .btn-parked { background: #3b82f6; color: white; }
        .btn-consegna { background: #22c55e; color: white; }

        .pacco-details-card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; padding: 1rem; margin-bottom: 1rem; max-height: 250px; overflow-y: auto; }
        .pacco-label { font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .pacco-label:first-child { margin-top: 0; }
        .pacco-value { font-size: 1.05rem; font-weight: 800; color: #ffffff; }
        
        .consegna-options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
        .option-btn { background: #293548; border: 1px solid #334155; color: white; padding: 1rem 0.5rem; border-radius: 12px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 0.85rem; text-align: center; }
        .option-btn:hover { border-color: #f97316; background: #334155; }
        
        .input-text-premium { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 0.65rem; border-radius: 8px; font-family: inherit; box-sizing: border-box; margin-bottom: 0.75rem; }
        #signature-canvas { background: #ffffff; border: 2px dashed #cbd5e1; border-radius: 8px; cursor: crosshair; display: block; width: 100%; height: 100px; box-sizing: border-box; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="nav-container">
        <header class="navbar" style="background:#1e293b; border-bottom: 1px solid #334155; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center;">
            <a href="spazio-lavoratore.html" class="logo" style="text-decoration:none; font-weight:800; color:white;">RAR <span style="color:#f97316;">Logistik</span></a>
            <div id="lblStopAttuale" style="font-weight: 700; font-size: 0.85rem; color: #94a3b8;">Rotta RAR</div>
        </header>

        <div id="google-map"></div>

        <div class="navigation-panel">
            <div class="address-box">
                <span style="color: #f97316;" id="lblStatoTarget">Prossima Tappa:</span>
                <span id="txtIndirizzoTarget">--</span>
            </div>

            <!-- FASE 1: PANORAMICA (PRIMA DI PARTIRE) -->
            <div id="panelPanoramica">
                <div class="driving-info-row">
                    <div class="eta-box" id="txtPanETA">-- Min</div>
                    <div class="km-box" id="txtPanKm">-- km</div>
                </div>
                <button onclick="avviaNavigazioneLive()" class="btn-action btn-start-nav">▶️ Avvia Navigazione</button>
            </div>

            <!-- FASE 2: IN VIAGGIO (NAVIGAZIONE ATTIVA 3D) -->
            <div id="panelInViaggio" class="hidden">
                <div class="driving-info-row">
                    <div class="eta-box" id="txtETA">-- Min</div>
                    <div class="km-box" id="txtKmRimanenti">-- km</div>
                </div>
                
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; font-weight: 700; margin-bottom: 1rem; text-transform: uppercase;">
                    <span>🛑 Stop rimanenti: <span id="lblStopRimanenti" style="color:#f97316;">-</span></span>
                    <span>🕒 ETA End Tour: <span id="lblETAEndTour" style="color:#f97316;">--:--</span></span>
                </div>
                
                <button onclick="fermaArrivatoSulPosto()" class="btn-action btn-parked">🅿️ Sono Arrivato sul Posto</button>
            </div>

            <!-- FASE 3: GESTIONE CONSEGNA -->
            <div id="panelArrivato" class="hidden">
                <div class="pacco-details-card">
                    <div class="pacco-label">👤 Destinatario</div>
                    <div class="pacco-value" id="txtNomeDestinatario">---</div>
                    <div class="pacco-label">📦 Colli in Consegna</div>
                    <div class="pacco-value" id="txtNumeroColli" style="color:#f97316;">1</div>

                    <div id="boxSceltaEsito">
                        <div class="pacco-label">Scegli Modalità di Chiusura:</div>
                        <div class="consegna-options-grid">
                            <button onclick="selezionaEsito('mano')" class="option-btn">🤝 A Mani</button>
                            <button onclick="selezionaEsito('sicuro')" class="option-btn">🔒 Posto Sicuro</button>
                        </div>
                    </div>

                    <div id="boxEsitoMano" class="hidden">
                        <div class="pacco-label">Nome di chi riceve il pacco:</div>
                        <input type="text" id="txtNomeRicevente" class="input-text-premium" placeholder="Es. Mario Rossi">
                        <div class="pacco-label">Firma sullo schermo:</div>
                        <canvas id="signature-canvas"></canvas>
                        <button onclick="pulisciFirma()" style="background:none; border:none; color:#f87171; font-size:0.75rem; font-weight:700; margin-top:0.25rem; cursor:pointer;">🧹 Cancella Firma</button>
                    </div>

                    <div id="boxEsitoSicuro" class="hidden">
                        <div class="pacco-label">Foto Prova Consegna (Obbligatoria):</div>
                        <label class="btn-action" style="background:#334155; color:white; font-size:0.9rem; margin-bottom:0.5rem;">
                            📷 Scatta Foto Posto Sicuro
                            <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="gestisciFotoPostoSicuro(this)">
                        </label>
                        <div id="txtStatoFoto" style="font-size:0.8rem; color:#4ade80; text-align:center; font-weight:700;"></div>
                    </div>
                </div>

                <button id="btnSalvaChiusura" onclick="concludiEInviaEsito()" class="btn-action btn-consegna hidden">💾 Conferma Consegna</button>
                <button onclick="annullaSceltaEsito()" id="btnAnnullaEsito" class="hidden" style="background:none; border:none; color:#94a3b8; width:100%; font-size:0.8rem; font-weight:700; margin-top:0.5rem; cursor:pointer;">Torna indietro</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {  
            apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0",  
            authDomain: "rar-logistik-7663d.firebaseapp.com",   
            projectId: "rar-logistik-7663d",    
            storageBucket: "rar-logistik-7663d.firebasestorage.app",    
            messagingSenderId: "657384053565",  
            appId: "1:657384053565:web:fc1e812a80553f1eb08354"  
        };    
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let map, directionsService, directionsRenderer;
        let rotta = [];
        let indiceAttuale = 0;
        let idRottaGlobale = "";
        let markerFurgone = null;
        let markerDestinazioneVerde = null;
        let watchId = null;
        let posizioneFurgoneGPS = { lat: 46.6249, lng: 14.3053 };
        
        let tipoEsitoSelezionato = "";
        let fotoPostoSicuroBase64 = "";
        let canvas, ctx, drawing = false;
        let ultimoHeadingValido = 0;

        function initMapNavigatore() {
            directionsService = new google.maps.DirectionsService();
            
            // FIX: suppressMarkers: true elimina per sempre le lettere rosse A e B automatiche!
            directionsRenderer = new google.maps.DirectionsRenderer({
                polylineOptions: { strokeColor: "#f97316", strokeWeight: 6 },
                suppressMarkers: true 
            });

            map = new google.maps.Map(document.getElementById("google-map"), {
                zoom: 15, center: posizioneFurgoneGPS, disableDefaultUI: true,
                renderingType: google.maps.RenderingType.VECTOR, tilt: 0, heading: 0
            });
            directionsRenderer.setMap(map);

            // Cursore Blu della RAR Logistik (Sei tu, il punto A non serve!)
            markerFurgone = new google.maps.Marker({
                position: posizioneFurgoneGPS, map: map, title: "La tua posizione", zIndex: 10,
                icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 6, fillColor: "#3b82f6", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2 }
            });

            // Pallino Verde Personalizzato per il punto B (La Tappa)
            markerDestinazioneVerde = new google.maps.Marker({
                position: posizioneFurgoneGPS, map: map, title: "Destinazione", zIndex: 5,
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: "#22c55e", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2 }
            });

            inizializzaDisegnoFirma();
            scaricaRottaAssegnata();
        }

        async function scaricaRottaAssegnata() {
            let codiceRichiesto = prompt("Digita il codice rotta da caricare (es. 101):");
            if (!codiceRichiesto) { window.location.href = "spazio-lavoratore.html"; return; }
            idRottaGlobale = codiceRichiesto.trim();

            try {
                const docSnap = await db.collection("Rotte").doc(idRottaGlobale).get();
                if (docSnap.exists) {
                    rotta = docSnap.data().tappe || [];
                    indiceAttuale = rotta.findIndex(stop => !stop.consegnato);
                    if (indiceAttuale === -1) { alert("Rotta già completata!"); window.location.href = "spazio-lavoratore.html"; return; }
                    recuperaPosizioneInizialeEPanoramica();
                } else { alert("Rotta non trovata."); scaricaRottaAssegnata(); }
            } catch (e) { console.error(e); }
        }

        function recuperaPosizioneInizialeEPanoramica() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    posizioneFurgoneGPS = { lat: position.coords.latitude, lng: position.coords.longitude };
                    markerFurgone.setPosition(posizioneFurgoneGPS);
                    mostraPanoramicaStatico();
                }, () => { mostraPanoramicaStatico(); });
            } else { mostraPanoramicaStatico(); }
        }

        function mostraPanoramicaStatico() {
            const stopCorrente = rotta[indiceAttuale];
            document.getElementById('lblStopAttuale').innerText = `Tappa ${indiceAttuale + 1} di ${rotta.length}`;
            document.getElementById('txtIndirizzoTarget').innerText = stopCorrente.address;
            document.getElementById('lblStatoTarget').innerText = "Prossima Tappa:";
            document.getElementById('panelPanoramica').classList.remove('hidden');
            document.getElementById('panelInViaggio').classList.add('hidden');
            document.getElementById('panelArrivato').classList.add('hidden');

            // Visuale dall'alto per decidere la partenza
            map.setTilt(0); map.setHeading(0);

            const destinazioneTappa = { lat: stopCorrente.lat, lng: stopCorrente.lng };
            markerDestinazioneVerde.setPosition(destinazioneTappa);

            directionsService.route({
                origin: posizioneFurgoneGPS, destination: destinazioneTappa, travelMode: google.maps.TravelMode.DRIVING
            }, (res, status) => {
                if (status === "OK") {
                    directionsRenderer.setDirections(res);
                    const leg = res.routes[0].legs[0];
                    document.getElementById('txtPanKm').innerText = leg.distance.text;
                    document.getElementById('txtPanETA').innerText = leg.duration.text;
                }
            });
        }

        // AGGIORNAMENTO GPS REAL-TIME COMPATIBILE CON MAPS 3D
        window.avviaNavigazioneLive = function() {
            document.getElementById('panelPanoramica').classList.add('hidden');
            document.getElementById('panelInViaggio').classList.remove('hidden');
            
            // Forza lo zoom ravvicinato e l'inclinazione prospettica da navigatore di auto (60 gradi)
            map.setZoom(19); 
            map.setTilt(60); 

            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition((position) => {
                    posizioneFurgoneGPS = { lat: position.coords.latitude, lng: position.coords.longitude };
                    
                    // Sposta il cursore blu e centra l'inquadratura dello smartphone sul mezzo
                    markerFurgone.setPosition(posizioneFurgoneGPS);
                    map.setCenter(posizioneFurgoneGPS);

                    // ROTAZIONE MAPPA MAPS: Ruota lo schermo solo se ci stiamo muovendo davvero (sopra i 3 km/h)
                    let velocita = position.coords.speed; 
                    if (velocita && velocita > 0.8 && position.coords.heading !== null && !isNaN(position.coords.heading)) {
                        ultimoHeadingValido = position.coords.heading;
                        map.setHeading(ultimoHeadingValido);
                    } else if (ultimoHeadingValido !== 0) { 
                        map.setHeading(ultimoHeadingValido); 
                    }

                    const stopCorrente = rotta[indiceAttuale];
                    const destinazioneTappa = { lat: stopCorrente.lat, lng: stopCorrente.lng };
                    markerDestinazioneVerde.setPosition(destinazioneTappa);

                    // Aggiornamento metriche inferiori richieste
                    const rimanenti = rotta.filter(s => !s.consegnato).length;
                    document.getElementById('lblStopRimanenti').innerText = rimanenti;

                    const oraAttuale = new Date();
                    oraAttuale.setMinutes(oraAttuale.getMinutes() + (rimanenti * 12));
                    document.getElementById('lblETAEndTour').innerText = oraAttuale.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                    directionsService.route({
                        origin: posizioneFurgoneGPS, destination: destinazioneTappa, travelMode: google.maps.TravelMode.DRIVING
                    }, (res, status) => {
                        if (status === "OK") {
                            directionsRenderer.setDirections(res);
                            const leg = res.routes[0].legs[0];
                            document.getElementById('txtKmRimanenti').innerText = leg.distance.text;
                            document.getElementById('txtETA').innerText = leg.duration.text;
                        }
                    });
                }, () => console.log("Errore GPS"), { enableHighAccuracy: true, maximumAge: 0, timeout: 3000 });
            }
        };

        window.fermaArrivatoSulPosto = function() {
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            document.getElementById('panelInViaggio').classList.add('hidden');
            document.getElementById('panelArrivato').classList.remove('hidden');
            document.getElementById('lblStatoTarget').innerText = "📍 Consegna sul posto:";

            const stopCorrente = rotta[indiceAttuale];
            document.getElementById('txtNomeDestinatario').innerText = stopCorrente.destinatario;
            document.getElementById('txtNumeroColli').innerText = stopCorrente.quantitaPacchi || 1;
            annullaSceltaEsito();
        };

        window.selezionaEsito = function(tipo) {
            tipoEsitoSelezionato = tipo;
            document.getElementById('boxSceltaEsito').classList.add('hidden');
            document.getElementById('btnSalvaChiusura').classList.remove('hidden');
            document.getElementById('btnAnnullaEsito').classList.remove('hidden');

            if (tipo === 'mano') { document.getElementById('boxEsitoMano').classList.remove('hidden'); } 
            else if (tipo === 'sicuro') { document.getElementById('boxEsitoSicuro').classList.remove('hidden'); document.getElementById('btnSalvaChiusura').classList.add('hidden'); }
        };

        window.annullaSceltaEsito = function() {
            tipoEsitoSelezionato = ""; fotoPostoSicuroBase64 = "";
            document.getElementById('txtNomeRicevente').value = ""; pulisciFirma();
            document.getElementById('txtStatoFoto').innerText = "";
            document.getElementById('boxSceltaEsito').classList.remove('hidden');
            document.getElementById('boxEsitoMano').classList.add('hidden'); document.getElementById('boxEsitoSicuro').classList.add('hidden');
            document.getElementById('btnSalvaChiusura').classList.add('hidden'); document.getElementById('btnAnnullaEsito').classList.add('hidden');
        };

        window.gestisciFotoPostoSicuro = function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const maxW = 500;
                        const scale = maxW / img.width;
                        const canvasCompresso = document.createElement('canvas');
                        canvasCompresso.width = maxW;
                        canvasCompresso.height = img.height * scale;
                        
                        const ctxCompresso = canvasCompresso.getContext('2d');
                        ctxCompresso.drawImage(img, 0, 0, canvasCompresso.width, canvasCompresso.height);
                        
                        fotoPostoSicuroBase64 = canvasCompresso.toDataURL('image/jpeg', 0.65);
                        document.getElementById('txtStatoFoto').innerText = "📸 Foto ottimizzata e pronta!";
                        document.getElementById('btnSalvaChiusura').classList.remove('hidden'); 
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.concludiEInviaEsito = async function() {
            let dettagliEsito = {};

            if (tipoEsitoSelezionato === 'mano') {
                const nomeRicevente = document.getElementById('txtNomeRicevente').value.trim();
                if(!nomeRicevente) { alert("Inserisci il nome della persona!"); return; }
                const firmaBase64 = canvas.toDataURL();
                dettagliEsito = { esito: "Consegnato a mani", persona: nomeRicevente, firma: firmaBase64 };
            } else {
                if(!fotoPostoSicuroBase64) { alert("Manca la foto!"); return; }
                dettagliEsito = { esito: "Lasciato in posto sicuro", fotoProva: fotoPostoSicuroBase64 };
            }

            let copieTappeAggiornate = [...rotta];
            copieTappeAggiornate[indiceAttuale].consegnato = true;
            copieTappeAggiornate[indiceAttuale].reportConsegna = dettagliEsito;

            try {
                await db.collection("Rotte").doc(idRottaGlobale).update({ tappe: copieTappeAggiornate });
                
                rotta = copieTappeAggiornate;
                let prossimoIndice = rotta.findIndex(stop => !stop.consegnato);
                
                if (prossimoIndice === -1) {
                    alert("Grandioso! Hai completato tutte le consegne assegnate per oggi! 🏁");
                    window.location.href = "spazio-lavoratore.html";
                } else {
                    alert("Tappa salvata con successo!");
                    indiceAttuale = prossimoIndice;
                    directionsRenderer.setDirections({routes: []}); 
                    mostraPanoramicaStatico();
                }
            } catch(e) { 
                console.error(e);
                alert("Errore di sincronizzazione Cloud. Riprova."); 
            }
        };

        function inizializzaDisegnoFirma() {
            canvas = document.getElementById('signature-canvas'); ctx = canvas.getContext('2d');
            ctx.strokeStyle = "#0f172a"; ctx.lineWidth = 3;
            canvas.addEventListener("mousedown", (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
            canvas.addEventListener("mousemove", (e) => { if (drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
            window.addEventListener("mouseup", () => drawing = false);
            canvas.addEventListener("touchstart", (e) => { drawing = true; ctx.beginPath(); const t = e.touches[0]; const rect = canvas.getBoundingClientRect(); ctx.moveTo(t.clientX - rect.left, t.clientY - rect.top); e.preventDefault(); });
            canvas.addEventListener("touchmove", (e) => { if (drawing) { const t = e.touches[0]; const rect = canvas.getBoundingClientRect(); ctx.lineTo(t.clientX - rect.left, t.clientY - rect.top); ctx.stroke(); } e.preventDefault(); });
            canvas.addEventListener("touchend", () => drawing = false);
        }
        window.pulisciFirma = function() { if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); };
    </script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvd_JFOMreUFxPpo-ADU00_Qr3-0B8HeA&libraries=places&callback=initMapNavigatore"></script>
</body>
</html>
