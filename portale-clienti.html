<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Portale Clienti & Spedizioni</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #f97316; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .portal-container { max-width: 600px; margin: 2rem auto; padding: 1rem; }
        .form-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .label-template { background: white; border: 3px solid #000; padding: 1.5rem; width: 100%; max-width: 380px; margin: 2rem auto; display: none; text-align: center; }
    </style>
</head>
<body>

    <main class="portal-container">
        <h1>Crea Nuova Spedizione</h1>
        <div class="form-card" id="formSpedizione">
            <input type="text" id="destName" class="input-field" placeholder="Destinatario" style="margin-bottom:10px;">
            <input type="number" id="peso" class="input-field" placeholder="Peso (kg)" style="margin-bottom:10px;">
            <input type="text" id="misure" class="input-field" placeholder="Misure (es: 30x20x10)" style="margin-bottom:10px;">
            <input type="text" id="destAddress" class="input-field" placeholder="Indirizzo" style="margin-bottom:10px;">
            <input type="text" id="destCap" class="input-field" placeholder="CAP" style="margin-bottom:10px;">
            <input type="text" id="destCity" class="input-field" placeholder="Città" style="margin-bottom:10px;">
            <button id="btnGenera" class="btn-action">Genera Spedizione ed Etichetta ⚡</button>
        </div>

       <div class="label-template" id="logisticLabel">
    <div style="border-bottom: 2px solid #000; margin-bottom: 10px;">
        <h2 style="margin: 0;">RAR LOGISTIK</h2>
    </div>
    <div style="text-align: left; font-size: 0.9rem;">
        <p><strong>Destinatario:</strong> <span id="lblDest"></span></p>
        <p><strong>Peso:</strong> <span id="lblPeso"></span> kg</p>
        <p><strong>Misure:</strong> <span id="lblMisure"></span> cm</p>
         <p><strong>Address:</strong> <span id="lblAddress"></span> cm</p>
    </div>
    <div id="qrcode" style="display:flex; justify-content:center; margin: 15px 0;"></div>
    <button id="btnDownload" class="btn-action" style="background: #3b82f6;">Download & Invia Email 📧</button>
</div>

</body>
</html>
