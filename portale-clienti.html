<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Generazione Etichette</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script> (function(){ emailjs.init("TUO_USER_ID_EMAILJS"); })(); </script>
    <style>
        :root { --primary: #0f172a; --accent: #f97316; }
        body { background-color: var(--primary); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .form-card { background: #1e293b; padding: 2rem; border-radius: 16px; width: 100%; max-width: 450px; border: 1px solid #334155; }
        .input-group { margin-bottom: 1rem; }
        .input-field { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; background: var(--accent); border: none; border-radius: 8px; font-weight: 800; color: white; cursor: pointer; }
        .label-template { background: white; color: black; padding: 20px; width: 350px; display: none; margin: 20px auto; border: 2px solid #000; }
    </style>
</head>
<body>

<div class="form-card" id="formSpedizione">
    <h1 style="color: var(--accent); text-align: center;">Genera Spedizione</h1>
    <input type="text" id="destName" class="input-field" placeholder="Nome Destinatario">
    <input type="number" id="peso" class="input-field" placeholder="Peso (kg)">
    <input type="text" id="misure" class="input-field" placeholder="Misure (es: 30x20x10)">
    <input type="text" id="destAddress" class="input-field" placeholder="Indirizzo">
    <input type="text" id="destCap" class="input-field" placeholder="CAP">
    <input type="text" id="destCity" class="input-field" placeholder="Città">
    <button onclick="window.creaSpedizioneCloud()">Genera Etichetta ⚡</button>
</div>

<div class="label-template" id="logisticLabel">
    <h2>RAR LOGISTIK</h2>
    <div id="lblData"></div>
    <div id="qrcode"></div>
    <button onclick="processaEtichetta()">Download & Invia Email 📧</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { /* Le tue chiavi */ };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.creaSpedizioneCloud = async function() {
        // ... (Logica esistente di salvataggio Firebase)
        document.getElementById('formSpedizione').style.display = 'none';
        document.getElementById('logisticLabel').style.display = 'block';
    };
window.processaEtichetta = async function() {
    const element = document.getElementById('logisticLabel');
    
    // Rimuoviamo il "display: none" forzato per assicurarci che sia visibile per la cattura
    element.style.display = 'block'; 
    
    try {
        const canvas = await html2canvas(element, {
            scale: 2, // Aumenta la qualità
            useCORS: true
        });

        // Crea un URL temporaneo per l'immagine
        const image = canvas.toDataURL("image/png");

        // Forza il download in modo più esplicito
        const link = document.createElement('a');
        link.href = image;
        link.download = 'Etichetta_RAR.png';
        document.body.appendChild(link); // Necessario per alcuni browser
        link.click();
        document.body.removeChild(link); // Pulisce dopo il click

        // Invio Email subito dopo
        await emailjs.send("service_ID", "template_ID", {
            destinatario: document.getElementById('destName').value,
            peso: document.getElementById('peso').value,
            misure: document.getElementById('misure').value,
            to_email: "rarlogistik@gmail.com"
        });

        alert("Operazione completata!");
    } catch (err) {
        console.error("Errore fatale:", err);
        alert("Errore: " + err.message);
    }
};
</script>
</body>
</html>
