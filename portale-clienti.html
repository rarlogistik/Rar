<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik - Portale Clienti & Spedizioni</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #f97316; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; }
        .portal-container { max-width: 500px; margin: 0 auto; }
        .form-card { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-field { width: 100%; padding: 0.75rem; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .label-template { background: white; border: 3px solid #000; padding: 20px; width: 350px; margin: 20px auto; display: none; text-align: left; }
    </style>
</head>
<body>

    <main class="portal-container">
        <h1>Crea Spedizione</h1>
        <div class="form-card" id="formSpedizione">
            <input type="text" id="destName" class="input-field" placeholder="Destinatario">
            <input type="number" id="peso" class="input-field" placeholder="Peso (kg)">
            <input type="text" id="misure" class="input-field" placeholder="Misure (es: 30x20x10)">
            <input type="text" id="destAddress" class="input-field" placeholder="Indirizzo">
            <input type="text" id="destCap" class="input-field" placeholder="CAP">
            <input type="text" id="destCity" class="input-field" placeholder="Città">
            <button id="btnGenera" class="btn-action">Genera Spedizione ed Etichetta ⚡</button>
        </div>

        <div class="label-template" id="logisticLabel">
            <h2 style="text-align:center; margin-top:0;">RAR LOGISTIK</h2>
            <p><strong>Destinatario:</strong> <span id="lblDest"></span></p>
            <p><strong>Indirizzo:</strong> <span id="lblIndirizzo"></span></p>
            <p><strong>Peso:</strong> <span id="lblPeso"></span> kg</p>
            <p><strong>Misure:</strong> <span id="lblMisure"></span> cm</p>
            <div id="qrcode" style="display:flex; justify-content:center; margin: 15px 0;"></div>
            <button id="btnDownload" class="btn-action" style="background: #3b82f6;">Download & Invia Email 📧</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyDlGVX0woh3gyUWEh8l0x_mr0GnhjeusA0",
            authDomain: "rar-logistik-7663d.firebaseapp.com",
            projectId: "rar-logistik-7663d",
            storageBucket: "rar-logistik-7663d.firebasestorage.app",
            messagingSenderId: "657384053565",
            appId: "1:657384053565:web:fc1e812a80553f1eb08354"
        });

        const db = getFirestore(app);
        emailjs.init("service_9cbky1i"); // <--- INSERISCI QUI IL TUO ID

        async function creaSpedizione() {
            const dest = document.getElementById('destName').value;
            const address = document.getElementById('destAddress').value;
            const cap = document.getElementById('destCap').value;
            const city = document.getElementById('destCity').value;
            const peso = document.getElementById('peso').value;
            const misure = document.getElementById('misure').value;

            const docRef = await addDoc(collection(db, "Spedizioni"), {
                destinatario: dest,
                indirizzo: `${address}, ${cap} ${city}`,
                peso: peso,
                misure: misure
            });
            
            document.getElementById('lblDest').innerText = dest;
            document.getElementById('lblIndirizzo').innerText = `${address}, ${cap} ${city}`;
            document.getElementById('lblPeso').innerText = peso;
            document.getElementById('lblMisure').innerText = misure;

            document.getElementById('formSpedizione').style.display = 'none';
            document.getElementById('logisticLabel').style.display = 'block';
            
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), docRef.id);
        }

        async function processaEtichetta() {
            const element = document.getElementById('logisticLabel');
            const canvas = await html2canvas(element);
            const link = document.createElement('a');
            link.download = 'etichetta.png';
            link.href = canvas.toDataURL();
            link.click();

            await emailjs.send("service_ID", "template_ID", {
                destinatario: document.getElementById('destName').value,
                to_email: "rarlogistik@gmail.com"
            });
            alert("Operazione completata!");
        }

        document.getElementById('btnGenera').addEventListener('click', creaSpedizione);
        document.getElementById('btnDownload').addEventListener('click', processaEtichetta);
    </script>
</body>
</html>
