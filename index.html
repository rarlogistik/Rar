<!DOCTYPE html>
<html lang="it">
<head>
    <link rel=¨manifest¨ href=¨manifest.json¨>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAR Logistik Exzellenz - Portale Driver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .portal-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--white);
            text-align: center;
        }
        
        .portal-card {
            max-width: 600px;
            width: 100%;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .portal-card h1 {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
        }

        .portal-card h1 span {
            color: var(--accent);
            display: block;
            font-size: 3.2rem;
            margin-top: 0.25rem;
        }

        .portal-intro {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
        }

        .values-grid {
            display: flex;
            justify-content: space-around;
            gap: 1rem;
            margin-bottom: 2.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem 0;
        }

        .value-item {
            flex: 1;
        }

        .value-item .icon {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
            display: block;
        }

        .value-item .title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-portal-cta {
            display: block;
            width: 100%;
            padding: 1.1rem;
            background-color: var(--accent);
            color: var(--white);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-portal-cta:hover {
            background-color: #ea580c;
            transform: translateY(-2px);
        }

        .btn-portal-cta:active {
            transform: translateY(0);
        }

        /* Ottimizzazione Mobile */
        @media (max-width: 480px) {
            .portal-card {
                padding: 2rem 1.25rem;
            }
            .portal-card h1 {
                font-size: 2.2rem;
            }
            .portal-card h1 span {
                font-size: 2.5rem;
            }
            .portal-intro {
                font-size: 1rem;
            }
            .values-grid {
                flex-direction: column;
                gap: 1rem;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <header class="navbar" style="justify-content: center; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <span class="logo" style="font-size: 1.5rem;">RAR <span>Logistik</span></span>
    </header>

    <main class="portal-container">
        <section class="portal-card">
            <h1>RAR Logistik <span>Exzellenz</span></h1>
            
            <p class="portal-intro">
                Benvenuto nel portale operativo ufficiale. La nostra identità e il nostro successo quotidiano si fondano su tre pilastri imprescindibili che guidano ogni singola consegna.
            </p>

            <div class="values-grid">
                <div class="value-item">
                    <span class="icon">⏱️</span>
                    <span class="title">Puntualità</span>
                </div>
                <div class="value-item">
                    <span class="icon">🤝</span>
                    <span class="title">Cordialità</span>
                </div>
                <div class="value-item">
                    <span class="icon">✊</span>
                    <span class="title">Rispetto</span>
                </div>
            </div>

            <a href="login.html" class="btn-portal-cta">Accedi alla tua area privata</a>
        </section>
    </main>

</body>
</html>
